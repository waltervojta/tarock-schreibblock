<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ETS – Spiel auswählen (Farbenspiele)</title>

  <style>
    :root{
      --bg:#cfe9ff;
      --bar:#3b6fa8;
      --panel:#d9efff;
      --line:#000;
      --radius:12px;
      --font:Arial, sans-serif;
      --iconBg:#e6f3ff;
      --iconFill:#002244;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      font-family:var(--font);
      display:flex;
      justify-content:center;
    }
    .app{
      width:min(480px,100%);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      background:var(--bar);
      border-bottom:3px solid var(--line);
      padding:14px;
      text-align:center;
      font-weight:900;
      color:#fff;
    }
    .content{ flex:1; padding:12px; }
    .section{
      background:var(--panel);
      border:2px solid var(--line);
      border-radius:var(--radius);
      padding:10px;
    }
    .section h3{
      margin:6px 0 12px;
      text-align:center;
      font-size:15px;
      font-weight:900;
    }
    .game{
      background:#fff;
      border:1px solid rgba(0,0,0,.7);
      border-radius:10px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:900;
      margin-bottom:8px;
      cursor:pointer;
    }
    .game:active{ transform:translateY(1px); }

    .iconbar{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
      padding:8px;
      background:var(--bar);
      border-top:3px solid var(--line);
    }
    .iconbtn{
      height:44px;
      border-radius:8px;
      border:2px solid #001a33;
      background:var(--iconBg);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .iconbtn:active{ background:#cfe9ff; }
    .iconbtn svg{ width:22px; height:22px; fill:var(--iconFill); }
  </style>
</head>

<body>
<div class="app">

  <div class="topbar">Spiel auswählen (Farbenspiele)</div>

  <div class="content">
    <div class="section">
      <h3>Farbenspiele</h3>

      <div class="game" data-code="FARBENDREIER" data-value="5"><span>Farbendreier</span><span>5</span></div>
      <div class="game" data-code="FARBENSOLO" data-value="8"><span>Farbensolo</span><span>8</span></div>
    </div>
  </div>

  <div class="iconbar">
    <button class="iconbtn" title="Statistik">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="10" width="4" height="10"></rect>
        <rect x="10" y="6" width="4" height="14"></rect>
        <rect x="17" y="3" width="4" height="17"></rect>
      </svg>
    </button>

    <button class="iconbtn" title="Liste">
      <svg viewBox="0 0 24 24">
        <rect x="4" y="5" width="16" height="2"></rect>
        <rect x="4" y="11" width="16" height="2"></rect>
        <rect x="4" y="17" width="16" height="2"></rect>
      </svg>
    </button>

    <button class="iconbtn" title="Plus">
      <svg viewBox="0 0 24 24">
        <rect x="10" y="4" width="4" height="16"></rect>
        <rect x="4" y="10" width="16" height="4"></rect>
      </svg>
    </button>

    <button class="iconbtn" title="Minus">
      <svg viewBox="0 0 24 24">
        <rect x="4" y="10" width="16" height="4"></rect>
      </svg>
    </button>

    <button class="iconbtn" title="Farbkugel">
      <svg viewBox="0 0 24 24">
        <defs>
          <clipPath id="colHalfLeft"><rect x="0" y="0" width="12" height="24"></rect></clipPath>
          <clipPath id="colHalfRight"><rect x="12" y="0" width="12" height="24"></rect></clipPath>
        </defs>
        <circle cx="12" cy="12" r="9" fill="red" clip-path="url(#colHalfLeft)"></circle>
        <circle cx="12" cy="12" r="9" fill="blue" clip-path="url(#colHalfRight)"></circle>
        <circle cx="12" cy="12" r="9" fill="none" stroke="#002244" stroke-width="2"></circle>
      </svg>
    </button>

    <button class="iconbtn" title="Neu laden" onclick="location.reload()">
      <svg viewBox="0 0 24 24">
        <path d="M12 5a7 7 0 1 1-6.6 4.5h2.2A5 5 0 1 0 12 7v3l4-4-4-4v3z"></path>
      </svg>
    </button>

    <button class="iconbtn" title="Zurück" onclick="location.href14 5l-7 7 7 7V5z"></path>
      </svg>
    </button>
  </div>

</div>

<script>
  document.querySelectorAll('.game').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      sessionStorage.setItem(
        'selectedGame',
        JSON.stringify({
          code: btn.dataset.code,
          value: Number(btn.dataset.value),
          category: 'FARBE'
        })
      );
      // Weiterleitung zum Gabenergebnis-Screen folgt
    });
  });
</script>

</body>
</html>
