<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarock-Schreibblock – 5er Tisch</title>
  <style>
    :root{
      --bg:#cfe9ff;
      --panel:#cfe9ff;
      --barBg:#3b6fa8;
      --line:#000;
      --lineW:3px;
      --font: Arial, sans-serif;
      --black:#000;
      --red:#c00000;
      --btnBg:var(--panel);
      --btnBorder:rgba(0,0,0,.70);
      --btnRadius:6px;
      --iconDark:rgba(0,0,0,.92);
      --scoreBigSize:92px;
      --scoreSmallScale:0.5;
      --markVorhand:#ffe65a;
      --markPausedOpacity:0.35;
    }
    *{box-sizing:border-box;}
    html,body{height:100%; overflow:hidden;}
    body{margin:0;background:var(--bg);font-family:var(--font);display:flex;justify-content:center;}
    .phone{width:min(480px,100%);height:100dvh;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}

    .topbar{
      height: calc(58px + env(safe-area-inset-top));
      padding: calc(8px + env(safe-area-inset-top)) 12px 8px 12px;
      background:var(--barBg);
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .statusPill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 14px;
      background:var(--btnBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      color:var(--iconDark);
      font-size:16px; /* was 17 */
      font-weight:800;
      white-space:nowrap;
      max-width: calc(100% - 120px);
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .statusPill .lbl{font-weight:900;}
    .tok{font-weight:900;}
    .numRed{color:var(--red)!important;}
    .numBlack{color:var(--black)!important;}

    .roundPill{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      background:var(--btnBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      color:var(--iconDark);
      font-size:16px;
      font-weight:900;
      white-space:nowrap;
      min-width:92px;
      text-align:center;
    }

    .content{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
    .zone-mid{
      flex:1 1 auto;min-height:0;
      display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
      border-bottom:var(--lineW) solid var(--line);
      background:var(--panel);
    }
    .cell{position:relative;min-width:0;min-height:0;overflow:hidden;background:var(--panel);}
    .cell.left{border-right:var(--lineW) solid var(--line);}
    .cell.top{border-bottom:var(--lineW) solid var(--line);}
    .rotBox{
      position:absolute;left:50%;top:50%;
      transform-origin:center;width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
    }
    .rotBox.left{transform:translate(-50%,-50%) rotate(90deg);}
    .rotBox.right{transform:translate(-50%,-50%) rotate(-90deg);}

    .playerPanel{border-radius:10px;padding:6px 8px;}
    .playerPanel.isVorhand{background:var(--markVorhand);}
    .playerPanel.isPaused{opacity:var(--markPausedOpacity);}

    .side{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:8px;min-width:0;}
    .sideName{
      font-size: clamp(22px, 3.8vw, 30px);
      font-weight:700;
      color:var(--black);
      white-space:normal;
      line-height:1.05;
      text-align:center;
    }
    .sideScoreRow{display:flex;align-items:baseline;gap:1ch;white-space:nowrap;}
    .scoreBig{font-size: clamp(62px, 10vw, 82px);font-weight:700;line-height:1;letter-spacing:-1px;}
    .scoreSmall{font-size: calc(clamp(62px, 10vw, 82px) * 0.5);opacity:.95;}

    .zone-bottom{
      flex:0 0 24%;
      display:flex;justify-content:center;align-items:center;
      padding:10px 16px;background:var(--panel);
      border-bottom:var(--lineW) solid var(--line);
      min-height:0;
    }
    .rowTB{display:inline-flex;align-items:center;min-width:0;}
    .name{
      font-size:34px;font-weight:700;color:var(--black);
      white-space:normal;line-height:1.05;text-align:center;
    }
    .scoreBigB{font-size:var(--scoreBigSize);font-weight:700;line-height:1;letter-spacing:-1px;margin-left:1ch;}
    .scoreSmallB{font-size:calc(var(--scoreBigSize) * var(--scoreSmallScale));margin-left:1ch;opacity:.95;white-space:nowrap;}

    .bottombar{
      height: calc(62px + env(safe-area-inset-bottom));
      background:var(--barBg);
      border-top:var(--lineW) solid var(--line);
      --padX: clamp(6px, 2vw, 10px);
      --gapX: clamp(3px, 1.4vw, 10px);
      --padY: 6px;
      --btnW: clamp(38px, calc((100% - (2 * var(--padX)) - (6 * var(--gapX))) / 7), 56px);
      --btnH: clamp(40px, calc(var(--btnW) * 0.92), 50px);
      padding: var(--padY) var(--padX) calc(var(--padY) + env(safe-area-inset-bottom)) var(--padX);
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      column-gap: var(--gapX);
      align-items:center;
      justify-items:center;
      min-width:0;
    }
    .btn{
      width:var(--btnW);height:var(--btnH);
      background:var(--btnBg);border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      display:grid;place-items:center;
      user-select:none;color:var(--iconDark);cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      overflow:hidden;
    }
    .btn.pm{font-size:clamp(20px, calc(var(--btnW) * 0.48), 26px);font-weight:700;line-height:1;}
    .btn.close{font-size:clamp(18px, calc(var(--btnW) * 0.40), 22px);font-weight:800;line-height:1;}
    .rbBall{
      width: clamp(20px, calc(var(--btnW) * 0.50), 26px);
      height: clamp(20px, calc(var(--btnW) * 0.50), 26px);
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.55), transparent 35%),
        linear-gradient(90deg, #c00000 0 50%, #0047ff 50% 100%);
    }
    .iconSvg{width:30px;height:30px;display:block;color:var(--iconDark);}
    .iconSvg *{fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke;}
    .iconSvg .fillDot{fill:currentColor;stroke:none;}
    .btn .iconSvg{width: clamp(22px, calc(var(--btnW) * 0.55), 30px);height: clamp(22px, calc(var(--btnW) * 0.55), 30px);}
  </style>
</head>

<body>
<div class="phone">
  <div class="topbar">
    <div class="statusPill" id="statusPill"><span class="lbl">Letztes Spiel:</span>&nbsp;—</div>
    <div class="roundPill" id="roundPill">Spiel: 0</div>
  </div>

  <div class="content">
    <div class="zone-mid">
      <div class="cell left top">
        <div class="rotBox left">
          <div class="side playerPanel" data-seat="LEFT_TOP">
            <div id="name_LEFT_TOP" class="sideName">—</div>
            <div class="sideScoreRow">
              <div class="scoreBig" data-role="total">0</div>
              <div class="scoreSmall" data-role="delta">(0)</div>
            </div>
          </div>
        </div>
      </div>

      <div class="cell top">
        <div class="rotBox right">
          <div class="side playerPanel" data-seat="RIGHT_TOP">
            <div id="name_RIGHT_TOP" class="sideName">—</div>
            <div class="sideScoreRow">
              <div class="scoreBig" data-role="total">0</div>
              <div class="scoreSmall" data-role="delta">(0)</div>
            </div>
          </div>
        </div>
      </div>

      <div class="cell left">
        <div class="rotBox left">
          <div class="side playerPanel" data-seat="LEFT_BOTTOM">
            <div id="name_LEFT_BOTTOM" class="sideName">—</div>
            <div class="sideScoreRow">
              <div class="scoreBig" data-role="total">0</div>
              <div class="scoreSmall" data-role="delta">(0)</div>
            </div>
          </div>
        </div>
      </div>

      <div class="cell">
        <div class="rotBox right">
          <div class="side playerPanel" data-seat="RIGHT_BOTTOM">
            <div id="name_RIGHT_BOTTOM" class="sideName">—</div>
            <div class="sideScoreRow">
              <div class="scoreBig" data-role="total">0</div>
              <div class="scoreSmall" data-role="delta">(0)</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="zone-bottom">
      <div class="rowTB playerPanel" data-seat="BOTTOM">
        <div id="name_BOTTOM" class="name">—</div>
        <div class="scoreBigB" data-role="total">0</div>
        <div class="scoreSmallB" data-role="delta">(0)</div>
      </div>
    </div>
  </div>

  <div class="bottombar">
    <div class="btn" title="Statistik" aria-label="Statistik">
      <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 19.5H20"></path><path d="M7 19.5V11"></path><path d="M12 19.5V6.5"></path><path d="M17 19.5V14"></path>
      </svg>
    </div>
    <div class="btn" title="Liste" aria-label="Liste">
      <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 7H20"></path><path d="M7 12H20"></path><path d="M7 17H20"></path>
        <circle class="fillDot" cx="4" cy="7" r="1"></circle><circle class="fillDot" cx="4" cy="12" r="1"></circle><circle class="fillDot" cx="4" cy="17" r="1"></circle>
      </svg>
    </div>
    <div class="btn pm" title="Positivspiel (+)" aria-label="Positivspiel" data-nav="positiv">+</div>
    <div class="btn pm" title="Negativspiel (−)" aria-label="Negativspiel" data-nav="negativ">−</div>
    <div class="btn" title="Farbenspiel" aria-label="Farbenspiel" data-nav="farbe"><div class="rbBall"></div></div>
    <div class="btn" title="Korrigieren" aria-label="Korrigieren">
      <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 12a8 8 0 1 1-2.3-5.7"></path><path d="M20 5v4h-4"></path>
      </svg>
    </div>
    <div class="btn close" title="Schließen" aria-label="Schließen">✕</div>
  </div>
</div>

<!-- Close Confirm -->
<script>
(function(){
  const btn = document.querySelector('.btn.close');
  if(!btn) return;
  btn.addEventListener('click', function(ev){
    ev.preventDefault();
    ev.stopPropagation();
    if (confirm('Tisch wirklich beenden?')) {
      window.location.href = 'index.html';
    }
  }, {passive:false});
})();
</script>

<!-- ETS_NAV_WIRING -->
<script>
(function(){
  function go(href){ window.location.href = href; }
  var btnPos = document.querySelector('[data-nav="positiv"]');
  var btnNeg = document.querySelector('[data-nav="negativ"]');
  var btnCol = document.querySelector('[data-nav="farbe"]');
  if(btnPos) btnPos.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); go('spiel-auswahl-positiv.html'); }, {passive:false});
  if(btnNeg) btnNeg.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); go('spiel-auswahl-negativ.html'); }, {passive:false});
  if(btnCol) btnCol.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); go('spiel-auswahl-farbspiele.html'); }, {passive:false});
})();
</script>

<!-- Loader (5er) + Status + Runde -->
<script>
(function(){
  const DB_NAME='ets_db';
  const DB_VERSION=2;
  const STORE_PLAYERS='players';
  const STORE_CURR_SESSION='current_session';
  const STORE_CURR_STATE='current_state';
  const STORE_GABEN='gaben';
  const CURR_KEY='current';
  const TABLE_TYPE_EXPECTED=5;

  const seatKeys=["LEFT_TOP","RIGHT_TOP","LEFT_BOTTOM","RIGHT_BOTTOM","BOTTOM"];
  const ccwOrder=["BOTTOM","RIGHT_BOTTOM","RIGHT_TOP","LEFT_TOP","LEFT_BOTTOM"];

  const RUFER_GAMES = new Set(['KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER']);
  const RUFER_FIX_PREM = {
    KOENIG_RUFER: 'KOENIG_ULT',
    PAGATRUFER: 'PAGAT_ULTIMO',
    UHU_RUFER: 'UHU',
    KAKADU_RUFER: 'KAKADU',
    QUAPIL_RUFER: 'QUAPIL'
  };

  const GAME_LABELS = {
    KOENIG_RUFER: 'Rufer',
    PAGATRUFER: 'Rufer',
    UHU_RUFER: 'Rufer',
    KAKADU_RUFER: 'Rufer',
    QUAPIL_RUFER: 'Rufer',
    SOLO_RUFER: 'Solorufer',
    SECHSERDREIER: 'Sechserdreier',
    DREIER: 'Dreier',
    SOLO_DREIER: 'Solodreier',
    TRISCHAKEN: 'Trischaken',
    PICCOLO: 'Piccolo',
    ZWICCOLO: 'Zwiccolo',
    BETTLER: 'Bettler',
    PICCOLO_OUVERT: 'Piccolo ouvert',
    ZWICCOLO_OUVERT: 'Zwiccolo ouvert',
    BETTLER_OUVERT: 'Bettler ouvert',
    FARBENDREIER: 'Farbendreier',
    FARBENSOLO: 'Farbensolo'
  };

  const PREM_LABELS = {
    PAGAT_ULTIMO: 'Pagat',
    UHU: 'Uhu',
    KAKADU: 'Kakadu',
    QUAPIL: 'Quapil',
    KOENIG_ULT: 'König',
    TRULL: 'Trull',
    VIER_KOENIGE: '4 Könige',
    VALAT: 'Valat'
  };

  function openDb(){
    return new Promise((resolve,reject)=>{
      const req=indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded=()=>{};
      req.onsuccess=()=>resolve(req.result);
      req.onerror=()=>reject(req.error);
    });
  }

  function get(db, store, key){
    return new Promise((resolve,reject)=>{
      const tx=db.transaction(store,'readonly');
      const st=tx.objectStore(store);
      const rq=st.get(key);
      rq.onsuccess=()=>resolve(rq.result);
      rq.onerror=()=>reject(rq.error);
    });
  }

  function getPlayer(db, id){
    return new Promise((resolve,reject)=>{
      const tx=db.transaction(STORE_PLAYERS,'readonly');
      const st=tx.objectStore(STORE_PLAYERS);
      const rq=st.get(Number(id));
      rq.onsuccess=()=>resolve(rq.result);
      rq.onerror=()=>reject(rq.error);
    });
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#39;");
  }

  function setNum(el,n){
    if(!el) return;
    const v = Number(n) || 0;
    el.textContent = String(v);
    el.classList.remove('numRed','numBlack');
    if(v<0) el.classList.add('numRed'); else el.classList.add('numBlack');
  }

  function setDelta(el,n){
    if(!el) return;
    const v = Number(n) || 0;
    el.textContent = '(' + String(v) + ')';
    el.classList.remove('numRed','numBlack');
    if(v<0) el.classList.add('numRed'); else el.classList.add('numBlack');
  }

  function computeDealerSeat(nextGabeNr){
    return ccwOrder[(nextGabeNr-1) % ccwOrder.length];
  }

  function nextCcwSeat(seat){
    const i = ccwOrder.indexOf(seat);
    if(i<0) return ccwOrder[0];
    return ccwOrder[(i+1) % ccwOrder.length];
  }

  function clearMarkers(){
    document.querySelectorAll('.playerPanel').forEach(p=>p.classList.remove('isVorhand','isPaused'));
  }

  function markSeat(seat, cls){
    const el=document.querySelector(`.playerPanel[data-seat="${seat}"]`);
    if(el) el.classList.add(cls);
  }

  function normalizePremiumEntry(p){
    if(!p) return {mag:0, sign:+1};
    if(typeof p.mag === 'number' || typeof p.sign === 'number'){
      const mag = Number(p.mag) || 0;
      const sign = (Number(p.sign) === -1) ? -1 : +1;
      return {mag, sign};
    }
    if(typeof p.state === 'number'){
      const st = Number(p.state) || 0;
      if(st === 0) return {mag:0, sign:+1};
      if(st === 1) return {mag:1, sign:+1};
      if(st === 2) return {mag:1, sign:-1};
      if(st === 3) return {mag:2, sign:+1};
      if(st === 4) return {mag:2, sign:-1};
    }
    return {mag:0, sign:+1};
  }

  function getGameSign(gabe){
    if(!gabe || !gabe.game) return +1;
    if(typeof gabe.game.displayRaw === 'number'){
      const v = Number(gabe.game.displayRaw) || 0;
      if(v === 0) return +1;
      return (v < 0) ? -1 : +1;
    }
    if(typeof gabe.game.sign === 'number'){
      return (Number(gabe.game.sign) < 0) ? -1 : +1;
    }
    if(typeof gabe.game.displayValue === 'number'){
      return (Number(gabe.game.displayValue) < 0) ? -1 : +1;
    }
    return +1;
  }

  function tokSpan(text, sign){
    const cls = (Number(sign) < 0) ? 'numRed' : 'numBlack';
    return `<span class="tok ${cls}">${escapeHtml(text)}</span>`;
  }

  function buildStatusHtml(gabe){
    const gameCode = gabe && gabe.game && gabe.game.code ? String(gabe.game.code) : '';
    if(!gameCode) return `<span class="lbl">Letztes Spiel:</span>&nbsp;—`;

    const isRufer = RUFER_GAMES.has(gameCode);
    const gameSign = getGameSign(gabe);
    const premArr = (gabe && Array.isArray(gabe.premiums)) ? gabe.premiums : [];
    const premMap = new Map();
    for(const pr of premArr){
      if(pr && pr.key) premMap.set(String(pr.key), pr);
    }

    let html = `<span class="lbl">Letztes Spiel:</span>&nbsp;`;

    if(isRufer){
      const fixKey = RUFER_FIX_PREM[gameCode] || null;
      html += tokSpan('Rufer', gameSign);

      if(fixKey){
        const fixEntry = premMap.get(fixKey) || null;
        const {mag, sign} = normalizePremiumEntry(fixEntry);
        const fixSign = (mag === 0) ? +1 : sign;
        html += ' ' + tokSpan(PREM_LABELS[fixKey] || fixKey, fixSign);
      }

      const extras = [];
      for(const pr of premArr){
        const key = pr && pr.key ? String(pr.key) : '';
        if(!key) continue;
        if(fixKey && key === fixKey) continue;
        const {mag, sign} = normalizePremiumEntry(pr);
        if(mag === 0) continue;
        extras.push(tokSpan(PREM_LABELS[key] || key, sign));
      }
      if(extras.length > 0) html += ', ' + extras.join(', ');
      return html;
    }

    const gameLabel = GAME_LABELS[gameCode] || gameCode;
    html += tokSpan(gameLabel, gameSign);

    const used = [];
    for(const pr of premArr){
      const key = pr && pr.key ? String(pr.key) : '';
      if(!key) continue;
      const {mag, sign} = normalizePremiumEntry(pr);
      if(mag === 0) continue;
      used.push(tokSpan(PREM_LABELS[key] || key, sign));
    }
    if(used.length > 0) html += ', ' + used.join(', ');
    return html;
  }

  openDb().then(async db=>{
    const sess=await get(db, STORE_CURR_SESSION, CURR_KEY);
    const state=await get(db, STORE_CURR_STATE, CURR_KEY);

    if(!sess || !sess.tableType || Number(sess.tableType)!==TABLE_TYPE_EXPECTED){
      db.close(); window.location.href='index.html'; return;
    }

    const seats = sess.seats || {};
    const totals = (state && state.totalByPlayerId) ? state.totalByPlayerId : {};
    const lastD = (state && state.lastDeltaByPlayerId) ? state.lastDeltaByPlayerId : {};

    const lastGabeNr = (state && Number.isFinite(state.lastGabeNr)) ? Number(state.lastGabeNr) : 0;
    const nextGabeNr = lastGabeNr + 1;

    // Runde
    const roundPill = document.getElementById('roundPill');
    if(roundPill) roundPill.textContent = 'Runde: ' + String(lastGabeNr);

    for(const seat of seatKeys){
      const pid=seats[seat];
      const nameEl=document.getElementById('name_'+seat);
      const totEl=document.querySelector(`.playerPanel[data-seat="${seat}"] [data-role="total"]`);
      const delEl=document.querySelector(`.playerPanel[data-seat="${seat}"] [data-role="delta"]`);

      if(pid==null){
        if(nameEl) nameEl.textContent='—';
        setNum(totEl,0); setDelta(delEl,0);
        continue;
      }

      const p=await getPlayer(db,pid).catch(()=>null);
      if(nameEl){
        if(p){
          const nach=String(p.nachname||'');
          const vor=String(p.vorname||'');
          nameEl.innerHTML = escapeHtml(nach || String(pid)) + '<br>' + escapeHtml(vor);
        }else{
          nameEl.textContent=String(pid);
        }
      }

      setNum(totEl, Number(totals[String(pid)] ?? 0));
      setDelta(delEl, Number(lastD[String(pid)] ?? 0));
    }

    clearMarkers();
    const dealerSeat = computeDealerSeat(nextGabeNr);
    markSeat(dealerSeat,'isPaused');
    const vorhandSeat = nextCcwSeat(dealerSeat);
    markSeat(vorhandSeat,'isVorhand');

    const pill = document.getElementById('statusPill');
    if(pill){
      if(lastGabeNr > 0){
        const gabe = await get(db, STORE_GABEN, lastGabeNr).catch(()=>null);
        pill.innerHTML = gabe ? buildStatusHtml(gabe) : `<span class="lbl">Letztes Spiel:</span>&nbsp;—`;
      }else{
        pill.innerHTML = `<span class="lbl">Letztes Spiel:</span>&nbsp;—`;
      }
    }

    db.close();
  }).catch(()=>window.location.href='index.html');
})();
</script>

</body>
</html>
