<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarock-Schreibblock – 4er Tisch</title>
  <style>
    :root{
      --bg:#cfe9ff;
      --panel:#cfe9ff;
      --barBg:#3b6fa8;
      --line:#000;
      --lineW:3px;
      --font: Arial, sans-serif;
      --black:#000;
      --red:#c00000;
      --btnBg:var(--panel);
      --btnBorder:rgba(0,0,0,.70);
      --btnRadius:6px;
      --iconDark:rgba(0,0,0,.92);
      --scoreBigSize:92px;
      --scoreSmallScale:0.5;
      --gapNameToBig:1ch;
      --gapBigToSmall:1ch;

      /* Vorhand: dezent blau + Rahmen */
      --markVorhand:#bfe6ff;
      --markVorhandBorder:#1f5fa8;
      --markPausedOpacity:0.35;
    }

    *{box-sizing:border-box;}
    html,body{height:100%; overflow:hidden;}
    body{
      margin:0;
      background:var(--bg);
      font-family:var(--font);
      display:flex;
      justify-content:center;
    }

    .phone{
      width:min(480px,100%);
      height:100dvh;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topbar{
      height: calc(58px + env(safe-area-inset-top));
      padding: calc(8px + env(safe-area-inset-top)) 12px 8px 12px;
      background:var(--barBg);
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .navBtn{
      flex:0 0 auto;
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      background:var(--btnBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      color:var(--iconDark);
      font-size:20px;
      font-weight:900;
      line-height:1;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      cursor:pointer;
    }
    .navBtn:active{transform:translateY(1px);}
    .navBtn.disabled{opacity:.45; cursor:default;}
    .navBtn.disabled:active{transform:none;}

    .statusPill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 14px;
      background:var(--btnBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      color:var(--iconDark);
      font-size:14px;
      font-weight:800;
      white-space:nowrap;
      flex:1 1 auto;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .statusPill .lbl{font-weight:900;}
    .tok{font-weight:900;}
    .numRed{color:var(--red)!important;}
    .numBlack{color:var(--black)!important;}

    .roundPill{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      background:var(--btnBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      color:var(--iconDark);
      font-size:14px;
      font-weight:900;
      white-space:nowrap;
      min-width:92px;
      text-align:center;
    }

    .content{flex:1 1 auto; min-height:0; display:flex; flex-direction:column; overflow:hidden;}

    .zone-top{
      flex:0 0 30%;
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:10px;
      min-height:0;
    }

    .zone-mid{
      flex:1 1 auto;
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      position:relative;
      min-height:0;
    }

    .mid-left,.mid-right{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      min-width:0;
    }

    .centerLine{
      position:absolute;
      left:50%;
      top:0;
      bottom:0;
      width:var(--lineW);
      background:var(--line);
      transform:translateX(-50%);
    }

    .zone-bottom{
      flex:0 0 24%;
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:10px 16px;
      min-height:0;
    }

    .panelWrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      transform-origin:center;
      min-width:0;
    }
    .rot-top{ transform: rotate(180deg); }
    .rot-left{ transform: rotate(90deg); }
    .rot-right{ transform: rotate(-90deg); }

    .rowTB{display:inline-flex; align-items:center; min-width:0;}
    .colSide{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; min-width:0;}
    .sideScoreRow{display:flex; align-items:baseline; gap:var(--gapBigToSmall); white-space:nowrap;}

    .name{
      font-size:34px;
      font-weight:700;
      color:var(--black);
      white-space:normal;
      line-height:1.05;
      text-align:center;
    }
    .sideName{
      font-size:30px;
      font-weight:700;
      color:var(--black);
      white-space:normal;
      line-height:1.05;
      text-align:center;
    }

    .scoreBig{
      font-size:var(--scoreBigSize);
      font-weight:700;
      line-height:1;
      letter-spacing:-1px;
      margin-left:var(--gapNameToBig);
    }
    .scoreSmall{
      font-size:calc(var(--scoreBigSize) * var(--scoreSmallScale));
      line-height:1;
      margin-left:var(--gapBigToSmall);
      opacity:.95;
      white-space:nowrap;
    }

    /* Stable border (no layout shift) */
    .playerPanel{
      border-radius:10px;
      padding:6px 8px;
      border:2px solid transparent;
    }
    .playerPanel.isVorhand{
      background:var(--markVorhand);
      border-color:var(--markVorhandBorder);
    }
    .playerPanel.isPaused{opacity:var(--markPausedOpacity);}

    /* Bottom bar (8 buttons now) */
    .bottombar{
      height: calc(62px + env(safe-area-inset-bottom));
      background:var(--barBg);
      border-top:var(--lineW) solid var(--line);
      --padX: clamp(6px, 2vw, 10px);
      --gapX: clamp(3px, 1.2vw, 9px);
      --padY: 6px;
      --btnW: clamp(34px, calc((100% - (2 * var(--padX)) - (7 * var(--gapX))) / 8), 54px);
      --btnH: clamp(38px, calc(var(--btnW) * 0.92), 50px);
      padding: var(--padY) var(--padX) calc(var(--padY) + env(safe-area-inset-bottom)) var(--padX);
      display:grid;
      grid-template-columns: repeat(8, 1fr);
      column-gap: var(--gapX);
      align-items:center;
      justify-items:center;
      min-width:0;
    }

    .btn{
      width:var(--btnW);
      height:var(--btnH);
      background:var(--btnBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      display:grid;
      place-items:center;
      user-select:none;
      color:var(--iconDark);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      overflow:hidden;
    }
    .btn:active{transform:translateY(1px);}
    .btn:disabled{opacity:.45;cursor:default;}
    .btn:disabled:active{transform:none;}

    .btn.pm{font-size:clamp(18px, calc(var(--btnW) * 0.48), 24px); font-weight:700; line-height:1;}
    .btn.close{font-size:clamp(18px, calc(var(--btnW) * 0.40), 22px); font-weight:800; line-height:1;}

    .rbBall{
      width: clamp(18px, calc(var(--btnW) * 0.50), 26px);
      height: clamp(18px, calc(var(--btnW) * 0.50), 26px);
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.55), transparent 35%),
        linear-gradient(90deg, #c00000 0 50%, #0047ff 50% 100%);
    }

    .iconSvg{width:30px;height:30px;display:block;color:var(--iconDark);}
    .iconSvg *{fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke;}
    .iconSvg .fillDot{fill:currentColor;stroke:none;}
    .btn .iconSvg{width: clamp(20px, calc(var(--btnW) * 0.55), 30px);height: clamp(20px, calc(var(--btnW) * 0.55), 30px);}
  </style>
</head>

<body>
<div class="phone">
  <div class="topbar">
    <div class="navBtn" id="navBack" title="Vorheriges Spiel" aria-label="Vorheriges Spiel">&lt;</div>
    <div class="statusPill" id="statusPill"><span class="lbl">Letztes Spiel:</span> —</div>
    <div class="roundPill" id="roundPill">Spiel 0</div>
    <div class="navBtn" id="navFwd" title="Nächstes Spiel" aria-label="Nächstes Spiel">&gt;</div>
  </div>

  <div class="content">
    <div class="zone-top">
      <div class="panelWrap rot-top">
        <div class="rowTB playerPanel" data-seat="TOP">
          <div id="name_TOP" class="name">—</div>
          <div class="scoreBig" data-role="total">0</div>
          <div class="scoreSmall" data-role="delta">(0)</div>
        </div>
      </div>
    </div>

    <div class="zone-mid">
      <div class="mid-left">
        <div class="panelWrap rot-left">
          <div class="colSide playerPanel" data-seat="LEFT">
            <div id="name_LEFT" class="sideName">—</div>
            <div class="sideScoreRow">
              <div class="scoreBig" data-role="total" style="margin-left:0;">0</div>
              <div class="scoreSmall" data-role="delta" style="margin-left:0;">(0)</div>
            </div>
          </div>
        </div>
      </div>

      <div class="centerLine"></div>

      <div class="mid-right">
        <div class="panelWrap rot-right">
          <div class="colSide playerPanel" data-seat="RIGHT">
            <div id="name_RIGHT" class="sideName">—</div>
            <div class="sideScoreRow">
              <div class="scoreBig" data-role="total" style="margin-left:0;">0</div>
              <div class="scoreSmall" data-role="delta" style="margin-left:0;">(0)</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="zone-bottom">
      <div class="panelWrap">
        <div class="rowTB playerPanel" data-seat="BOTTOM">
          <div id="name_BOTTOM" class="name">—</div>
          <div class="scoreBig" data-role="total">0</div>
          <div class="scoreSmall" data-role="delta">(0)</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottombar">
    <div class="btn" title="Statistik" aria-label="Statistik">
      <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 19.5H20"></path><path d="M7 19.5V11"></path><path d="M12 19.5V6.5"></path><path d="M17 19.5V14"></path>
      </svg>
    </div>
    <div class="btn" title="Liste" aria-label="Liste">
      <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 7H20"></path><path d="M7 12H20"></path><path d="M7 17H20"></path>
        <circle class="fillDot" cx="4" cy="7" r="1"></circle><circle class="fillDot" cx="4" cy="12" r="1"></circle><circle class="fillDot" cx="4" cy="17" r="1"></circle>
      </svg>
    </div>
    <div class="btn pm" title="Positivspiel (+)" aria-label="Positivspiel" data-nav="positiv">+</div>
    <div class="btn pm" title="Negativspiel (−)" aria-label="Negativspiel" data-nav="negativ">−</div>
    <div class="btn" title="Farbenspiel" aria-label="Farbenspiel" data-nav="farbe"><div class="rbBall"></div></div>

    <div class="btn" title="Korrigieren" aria-label="Korrigieren" id="btnKorrigieren">
      <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 12a8 8 0 1 1-2.3-5.7"></path><path d="M20 5v4h-4"></path>
      </svg>
    </div>

    <div class="btn" title="Letztes Spiel löschen" aria-label="Letztes Spiel löschen" id="btnDeleteLast">
      <!-- Trash icon -->
      <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7H20"></path>
        <path d="M9 7V5.5C9 4.7 9.7 4 10.5 4h3C14.3 4 15 4.7 15 5.5V7"></path>
        <path d="M7 7l1 14h8l1-14"></path>
        <path d="M10 11v7"></path>
        <path d="M14 11v7"></path>
      </svg>
    </div>

    <div class="btn close" title="Schließen" aria-label="Schließen" id="btnClose">✕</div>
  </div>
</div>

<script>
(function(){
  const btn = document.getElementById('btnClose');
  if(!btn) return;
  btn.addEventListener('click', function(ev){
    ev.preventDefault();
    ev.stopPropagation();
    if (confirm('Tisch wirklich beenden?')) {
      window.location.href = 'index.html';
    }
  }, {passive:false});
})();
</script>

<script>
(function(){
  function go(href){ window.location.href = href; }
  var btnPos = document.querySelector('[data-nav="positiv"]');
  var btnNeg = document.querySelector('[data-nav="negativ"]');
  var btnCol = document.querySelector('[data-nav="farbe"]');
  if(btnPos) btnPos.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); go('spiel-auswahl-positiv.html'); }, {passive:false});
  if(btnNeg) btnNeg.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); go('spiel-auswahl-negativ.html'); }, {passive:false});
  if(btnCol) btnCol.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); go('spiel-auswahl-farbspiele.html'); }, {passive:false});
})();
</script>

<script>
(function(){
  const DB_NAME = 'ets_db';
  const DB_VERSION = 2;
  const STORE_PLAYERS = 'players';
  const STORE_CURR_SESSION = 'current_session';
  const STORE_CURR_STATE = 'current_state';
  const STORE_GABEN = 'gaben';
  const CURR_KEY = 'current';
  const TABLE_TYPE_EXPECTED = 4;

  const seatKeys = ["TOP","LEFT","RIGHT","BOTTOM"];
  const ccwOrder = ["BOTTOM","RIGHT","TOP","LEFT"]; // 4er CCW

  const RUFER_GAMES = new Set(['KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER']);
  const RUFER_FIX_PREM = {
    KOENIG_RUFER: 'KOENIG_ULT',
    PAGATRUFER: 'PAGAT_ULTIMO',
    UHU_RUFER: 'UHU',
    KAKADU_RUFER: 'KAKADU',
    QUAPIL_RUFER: 'QUAPIL'
  };

  const GAME_LABELS = {
    KOENIG_RUFER: 'Rufer',
    PAGATRUFER: 'Rufer',
    UHU_RUFER: 'Rufer',
    KAKADU_RUFER: 'Rufer',
    QUAPIL_RUFER: 'Rufer',
    SOLO_RUFER: 'Solorufer',
    SECHSERDREIER: 'Sechserdreier',
    DREIER: 'Dreier',
    SOLO_DREIER: 'Solodreier',
    TRISCHAKEN: 'Trischaken',
    PICCOLO: 'Piccolo',
    ZWICCOLO: 'Zwiccolo',
    BETTLER: 'Bettler',
    PICCOLO_OUVERT: 'Piccolo ouvert',
    ZWICCOLO_OUVERT: 'Zwiccolo ouvert',
    BETTLER_OUVERT: 'Bettler ouvert',
    FARBENDREIER: 'Farbendreier',
    FARBENSOLO: 'Farbensolo'
  };

  const PREM_LABELS = {
    PAGAT_ULTIMO: 'Pagat',
    UHU: 'Uhu',
    KAKADU: 'Kakadu',
    QUAPIL: 'Quapil',
    KOENIG_ULT: 'König',
    TRULL: 'Trull',
    VIER_KOENIGE: '4 Könige',
    VALAT: 'Valat'
  };

  let db = null;
  let sess = null;
  let state = null;
  let lastGabeNr = 0;      // gespeicherte Spiele
  let viewGabeNr = 0;      // aktuell angezeigtes Spiel

  let gabeByNr = new Map(); // gabeNr -> gabe
  let prefixTotals = [];    // i -> {pid: total}

  async function openDb(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {};
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function txGet(db, store, key){
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readonly');
      const st = tx.objectStore(store);
      const rq = st.get(key);
      rq.onsuccess = () => resolve(rq.result);
      rq.onerror = () => reject(rq.error);
    });
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#39;");
  }

  function setNum(el, n){
    if(!el) return;
    const v = Number(n) || 0;
    el.textContent = String(v);
    el.classList.remove('numRed','numBlack');
    if(v < 0) el.classList.add('numRed'); else el.classList.add('numBlack');
  }

  function setDelta(el, n){
    if(!el) return;
    const v = Number(n) || 0;
    el.textContent = '(' + String(v) + ')';
    el.classList.remove('numRed','numBlack');
    if(v < 0) el.classList.add('numRed'); else el.classList.add('numBlack');
  }

  function computeDealerSeat(nextGabeNr){
    return ccwOrder[(nextGabeNr - 1) % ccwOrder.length];
  }

  function nextCcwSeat(seat){
    const i = ccwOrder.indexOf(seat);
    if(i < 0) return ccwOrder[0];
    return ccwOrder[(i + 1) % ccwOrder.length];
  }

  function clearMarkers(){
    document.querySelectorAll('.playerPanel').forEach(p => p.classList.remove('isVorhand','isPaused'));
  }

  function markSeat(seat, cls){
    const el = document.querySelector(`.playerPanel[data-seat="${seat}"]`);
    if(el) el.classList.add(cls);
  }

  function normalizePremiumEntry(p){
    if(!p) return {mag:0, sign:+1};
    if(typeof p.mag === 'number' || typeof p.sign === 'number'){
      const mag = Number(p.mag) || 0;
      const sign = (Number(p.sign) === -1) ? -1 : +1;
      return {mag, sign};
    }
    if(typeof p.state === 'number'){
      const st = Number(p.state) || 0;
      if(st === 0) return {mag:0, sign:+1};
      if(st === 1) return {mag:1, sign:+1};
      if(st === 2) return {mag:1, sign:-1};
      if(st === 3) return {mag:2, sign:+1};
      if(st === 4) return {mag:2, sign:-1};
    }
    return {mag:0, sign:+1};
  }

  function getGameSign(gabe){
    if(!gabe || !gabe.game) return +1;
    if(typeof gabe.game.displayRaw === 'number'){
      const v = Number(gabe.game.displayRaw) || 0;
      if(v === 0) return +1;
      return (v < 0) ? -1 : +1;
    }
    if(typeof gabe.game.sign === 'number'){
      return (Number(gabe.game.sign) < 0) ? -1 : +1;
    }
    if(typeof gabe.game.displayValue === 'number'){
      return (Number(gabe.game.displayValue) < 0) ? -1 : +1;
    }
    return +1;
  }

  function tokSpan(text, sign){
    const cls = (Number(sign) < 0) ? 'numRed' : 'numBlack';
    return `<span class="tok ${cls}">${escapeHtml(text)}</span>`;
  }

  function buildStatusHtml(gabe, labelText){
    if(!gabe){
      return `<span class="lbl">${escapeHtml(labelText)}</span> —`;
    }

    const gameCode = gabe.game && gabe.game.code ? String(gabe.game.code) : '';
    if(!gameCode){
      return `<span class="lbl">${escapeHtml(labelText)}</span> —`;
    }

    const isRufer = RUFER_GAMES.has(gameCode);
    const gameSign = getGameSign(gabe);
    const premArr = Array.isArray(gabe.premiums) ? gabe.premiums : [];
    const premMap = new Map();
    for(const pr of premArr){
      if(pr && pr.key) premMap.set(String(pr.key), pr);
    }

    let html = `<span class="lbl">${escapeHtml(labelText)}</span> `;

    if(isRufer){
      const fixKey = RUFER_FIX_PREM[gameCode] || null;
      html += tokSpan('Rufer', gameSign);

      if(fixKey){
        const fixEntry = premMap.get(fixKey) || null;
        const {mag, sign} = normalizePremiumEntry(fixEntry);
        const fixSign = (mag === 0) ? +1 : sign;
        html += ' ' + tokSpan(PREM_LABELS[fixKey] || fixKey, fixSign);
      }

      const extras = [];
      for(const pr of premArr){
        const key = pr && pr.key ? String(pr.key) : '';
        if(!key) continue;
        if(fixKey && key === fixKey) continue;
        const {mag, sign} = normalizePremiumEntry(pr);
        if(mag === 0) continue;
        extras.push(tokSpan(PREM_LABELS[key] || key, sign));
      }
      if(extras.length > 0) html += ', ' + extras.join(', ');
      return html;
    }

    const gameLabel = GAME_LABELS[gameCode] || gameCode;
    html += tokSpan(gameLabel, gameSign);

    const used = [];
    for(const pr of premArr){
      const key = pr && pr.key ? String(pr.key) : '';
      if(!key) continue;
      const {mag, sign} = normalizePremiumEntry(pr);
      if(mag === 0) continue;
      used.push(tokSpan(PREM_LABELS[key] || key, sign));
    }
    if(used.length > 0) html += ', ' + used.join(', ');
    return html;
  }

  async function loadAllGaben(){
    gabeByNr.clear();
    prefixTotals = [];
    prefixTotals[0] = {};

    if(lastGabeNr <= 0) return;

    for(let i=1;i<=lastGabeNr;i++){
      const g = await txGet(db, STORE_GABEN, i).catch(()=>null);
      if(g) gabeByNr.set(i, g);
    }

    const seats = sess.seats || {};
    const pids = seatKeys.map(seat => seats[seat]).filter(x => x!=null).map(x => String(x));

    let running = {};
    for(const pid of pids) running[pid] = 0;
    prefixTotals[0] = {...running};

    for(let i=1;i<=lastGabeNr;i++){
      const g = gabeByNr.get(i);
      const d = g && g.deltaByPlayerId ? g.deltaByPlayerId : {};
      running = {...running};
      for(const pid of pids){
        running[pid] = (Number(running[pid]) || 0) + (Number(d[pid]) || 0);
      }
      prefixTotals[i] = running;
    }
  }

  function setNavEnabled(){
    const b = document.getElementById('navBack');
    const f = document.getElementById('navFwd');

    const canBack = (lastGabeNr >= 1 && viewGabeNr > 1);
    const canFwd  = (lastGabeNr >= 1 && viewGabeNr < lastGabeNr);

    if(b){
      b.classList.toggle('disabled', !canBack);
      b.setAttribute('aria-disabled', (!canBack).toString());
    }
    if(f){
      f.classList.toggle('disabled', !canFwd);
      f.setAttribute('aria-disabled', (!canFwd).toString());
    }
  }

  function renderView(){
    const seats = sess.seats || {};

    const rp = document.getElementById('roundPill');
    if(rp) rp.textContent = 'Spiel ' + String(lastGabeNr);

    for(const seat of seatKeys){
      const pid = seats[seat];
      const nameEl = document.getElementById('name_' + seat);
      const totEl = document.querySelector(`.playerPanel[data-seat="${seat}"] [data-role="total"]`);
      const delEl = document.querySelector(`.playerPanel[data-seat="${seat}"] [data-role="delta"]`);

      if(pid == null){
        if(nameEl) nameEl.textContent = '—';
        setNum(totEl, 0);
        setDelta(delEl, 0);
        continue;
      }

      const pidStr = String(pid);
      const tot = (prefixTotals[viewGabeNr] && prefixTotals[viewGabeNr][pidStr] != null) ? prefixTotals[viewGabeNr][pidStr] : 0;
      let del = 0;
      if(viewGabeNr >= 1){
        const g = gabeByNr.get(viewGabeNr);
        const d = g && g.deltaByPlayerId ? g.deltaByPlayerId : {};
        del = Number(d[pidStr]) || 0;
      }

      setNum(totEl, tot);
      setDelta(delEl, del);
    }

    const pill = document.getElementById('statusPill');
    if(pill){
      if(viewGabeNr <= 0){
        pill.innerHTML = `<span class="lbl">Letztes Spiel:</span> —`;
      } else {
        const label = (viewGabeNr === lastGabeNr) ? 'Letztes Spiel:' : ('Spiel ' + viewGabeNr + ':');
        pill.innerHTML = buildStatusHtml(gabeByNr.get(viewGabeNr) || null, label);
      }
    }

    clearMarkers();
    const nextNr = Math.max(1, viewGabeNr + 1);
    const dealerSeat = computeDealerSeat(nextNr);
    const vorhandSeat = nextCcwSeat(dealerSeat);
    markSeat(vorhandSeat, 'isVorhand');

    setNavEnabled();
  }

  async function rebuildStateAfterDelete(){
    const seats = sess.seats || {};
    const pids = seatKeys.map(seat => seats[seat]).filter(x => x!=null).map(x => String(x));

    const totals = {};
    const lastDelta = {};
    for(const pid of pids){
      totals[pid] = 0;
      lastDelta[pid] = 0;
    }

    let maxNr = 0;
    const all = [];
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_GABEN, 'readonly');
      const st = tx.objectStore(STORE_GABEN);
      const rq = st.openCursor();
      rq.onsuccess = (ev) => {
        const cur = ev.target.result;
        if(cur){
          const g = cur.value;
          const nr = Number(g && g.gabeNr);
          if(Number.isFinite(nr)){
            all.push(g);
            if(nr > maxNr) maxNr = nr;
          }
          cur.continue();
        } else {
          resolve();
        }
      };
      rq.onerror = () => reject(rq.error);
    });

    all.sort((a,b) => (Number(a.gabeNr)||0) - (Number(b.gabeNr)||0));

    for(const g of all){
      const d = g && g.deltaByPlayerId ? g.deltaByPlayerId : {};
      for(const pid of pids){
        totals[pid] = (Number(totals[pid]) || 0) + (Number(d[pid]) || 0);
      }
    }

    if(maxNr > 0){
      const lastG = all.find(x => Number(x.gabeNr) === maxNr);
      const d = lastG && lastG.deltaByPlayerId ? lastG.deltaByPlayerId : {};
      for(const pid of pids){
        lastDelta[pid] = Number(d[pid]) || 0;
      }
    }

    const newState = {
      key: CURR_KEY,
      totalByPlayerId: totals,
      lastDeltaByPlayerId: lastDelta,
      lastGabeNr: maxNr,
      updatedUtc: new Date().toISOString()
    };

    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_CURR_STATE, 'readwrite');
      tx.objectStore(STORE_CURR_STATE).put(newState);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });

    state = newState;
    lastGabeNr = maxNr;
  }

  async function deleteLastGame(){
    if(lastGabeNr <= 0) return;
    if(!confirm('Letztes Spiel wirklich löschen?')) return;

    const delNr = lastGabeNr;

    await new Promise((resolve, reject) => {
      const tx = db.transaction([STORE_GABEN], 'readwrite');
      tx.objectStore(STORE_GABEN).delete(delNr);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });

    await rebuildStateAfterDelete();

    viewGabeNr = Math.min(viewGabeNr, lastGabeNr);
    if(lastGabeNr > 0 && viewGabeNr === 0) viewGabeNr = lastGabeNr;

    await loadAllGaben();
    renderView();
  }

  function wireButtons(){
    const back = document.getElementById('navBack');
    const fwd  = document.getElementById('navFwd');

    if(back) back.addEventListener('click', (ev)=>{
      ev.preventDefault(); ev.stopPropagation();
      if(lastGabeNr < 1) return;
      if(viewGabeNr <= 1) return;
      viewGabeNr -= 1;
      renderView();
    }, {passive:false});

    if(fwd) fwd.addEventListener('click', (ev)=>{
      ev.preventDefault(); ev.stopPropagation();
      if(lastGabeNr < 1) return;
      if(viewGabeNr >= lastGabeNr) return;
      viewGabeNr += 1;
      renderView();
    }, {passive:false});

    const korr = document.getElementById('btnKorrigieren');
    if(korr) korr.addEventListener('click', (ev)=>{
      ev.preventDefault(); ev.stopPropagation();
      if(viewGabeNr <= 0) return;
      sessionStorage.setItem('editMode', 'edit');
      sessionStorage.setItem('editGabeNr', String(viewGabeNr));
      window.location.href = 'gabenergebnis.html';
    }, {passive:false});

    const del = document.getElementById('btnDeleteLast');
    if(del) del.addEventListener('click', async (ev)=>{
      ev.preventDefault(); ev.stopPropagation();
      if(lastGabeNr <= 0) return;
      try{ await deleteLastGame(); } catch(e){ alert('Löschen fehlgeschlagen'); }
    }, {passive:false});
  }

  async function init(){
    db = await openDb();
    sess = await txGet(db, STORE_CURR_SESSION, CURR_KEY);
    state = await txGet(db, STORE_CURR_STATE, CURR_KEY);

    if(!sess || !sess.tableType || Number(sess.tableType) !== TABLE_TYPE_EXPECTED){
      db.close();
      window.location.href = 'index.html';
      return;
    }

    lastGabeNr = (state && Number.isFinite(state.lastGabeNr)) ? Number(state.lastGabeNr) : 0;
    viewGabeNr = lastGabeNr;

    const seats = sess.seats || {};
    for(const seat of seatKeys){
      const pid = seats[seat];
      const nameEl = document.getElementById('name_' + seat);
      if(pid == null){
        if(nameEl) nameEl.textContent = '—';
        continue;
      }

      const p = await new Promise((resolve) => {
        const tx = db.transaction(STORE_PLAYERS, 'readonly');
        const st = tx.objectStore(STORE_PLAYERS);
        const rq = st.get(Number(pid));
        rq.onsuccess = () => resolve(rq.result);
        rq.onerror = () => resolve(null);
      });

      if(nameEl){
        if(p){
          const nach = String(p.nachname || '');
          const vor  = String(p.vorname || '');
          nameEl.innerHTML = escapeHtml(nach || String(pid)) + '<br>' + escapeHtml(vor);
        } else {
          nameEl.textContent = String(pid);
        }
      }
    }

    await loadAllGaben();
    wireButtons();
    renderView();
  }

  window.addEventListener('load', ()=>{
    init().catch(()=>{ window.location.href='index.html'; });
  });
})();
</script>
