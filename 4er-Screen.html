<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarock-Schreibblock – 4er Tisch</title>

  <style>
    :root{
      --bg:#cfe9ff;
      --panel:#cfe9ff;
      --barBg:#3b6fa8;

      --line:#000;
      --lineW:3px;

      --font: Arial, sans-serif;

      --scoreBigSize:92px;
      --scoreSmallScale:0.5;

      --gapNameToBig:1ch;
      --gapBigToSmall:1ch;

      --black:#000;
      --red:#c00000;

      --btnBg:var(--panel);
      --btnBorder:rgba(0,0,0,.70);
      --btnRadius:6px;
      --iconDark:rgba(0,0,0,.92);
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    html,body{overflow:hidden;}

    body{margin:0;background:var(--bg);font-family:var(--font);display:flex;justify-content:center;overflow-x:hidden;}

    .phone{width:min(480px,100%);height:100dvh;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}

    .topbar{height: calc(58px + env(safe-area-inset-top));padding: calc(8px + env(safe-area-inset-top)) 12px 8px 12px;background:var(--barBg);border-bottom:var(--lineW) solid var(--line);display:flex;align-items:center;justify-content:center;}

    .statusPill{display:inline-flex;align-items:center;gap:12px;padding:8px 14px;background:var(--btnBg);border:1px solid var(--btnBorder);border-radius:var(--btnRadius);color:var(--iconDark);font-size:17px;line-height:1.15;white-space:nowrap;max-width: calc(100% - 24px);overflow:hidden;text-overflow:ellipsis;}
    .markLose{ color:var(--red); font-weight:800; }
    .markNeg { color:var(--red); font-weight:700; }

    .clockSvg{width:30px;height:30px;color:var(--iconDark);flex:0 0 auto;display:block;}
    .clockSvg circle,.clockSvg path{fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
    .clockSvg .dot{fill:currentColor;stroke:none;}

    .content{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
    .zone-top{flex:0 0 30%;border-bottom:var(--lineW) solid var(--line);display:flex;justify-content:center;align-items:center;padding:10px;min-height:0;}
    .zone-mid{flex:1 1 auto;border-bottom:var(--lineW) solid var(--line);display:flex;position:relative;min-height:0;}
    .mid-left,.mid-right{flex:1;display:flex;justify-content:center;align-items:center;min-width:0;}
    .centerLine{position:absolute;left:50%;top:0;bottom:0;width:var(--lineW);background:var(--line);transform:translateX(-50%);}
    .zone-bottom{flex:0 0 24%;border-bottom:var(--lineW) solid var(--line);display:flex;justify-content:center;align-items:center;padding:10px 16px;min-height:0;}

    .panelWrap{width:100%;display:flex;justify-content:center;align-items:center;transform-origin:center;min-width:0;}
    .rot-top{transform:rotate(180deg);} 
    .rot-left{transform:rotate(90deg);} 
    .rot-right{transform:rotate(-90deg);} 

    .rowTopBottom{display:inline-flex;align-items:center;min-width:0;}

    .name{font-size:34px;font-weight:700;line-height:1.05;color:var(--black);}
    .scoreBig{font-size:var(--scoreBigSize);font-weight:700;line-height:1;letter-spacing:-1px;margin-left:var(--gapNameToBig);color:var(--black);}
    .scoreSmall{font-size:calc(var(--scoreBigSize)*var(--scoreSmallScale));line-height:1;margin-left:var(--gapBigToSmall);color:var(--black);opacity:.95;white-space:nowrap;}
    .numRed{color:var(--red);} 
    .numBlack{color:var(--black);} 

    .colSide{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;min-width:0;}
    .sideName{font-size:30px;font-weight:700;line-height:1.05;white-space:nowrap;color:var(--black);}
    .sideScoreRow{display:flex;align-items:baseline;gap:var(--gapBigToSmall);white-space:nowrap;}

    .bottombar{height: calc(62px + env(safe-area-inset-bottom));background:var(--barBg);border-top:var(--lineW) solid var(--line);
      --padX: clamp(6px, 2vw, 10px);--gapX: clamp(3px, 1.4vw, 10px);--padY: 6px;
      --btnW: clamp(38px, calc((100% - (2 * var(--padX)) - (6 * var(--gapX))) / 7), 56px);
      --btnH: clamp(40px, calc(var(--btnW) * 0.92), 50px);
      padding: var(--padY) var(--padX) calc(var(--padY) + env(safe-area-inset-bottom)) var(--padX);
      display:grid;grid-template-columns: repeat(7, 1fr);column-gap: var(--gapX);align-items:center;justify-items:center;min-width:0;}
    .bottom-left,.bottom-mid,.bottom-right{display:contents;}
    .btn{width: var(--btnW);height: var(--btnH);background: var(--btnBg);border: 1px solid var(--btnBorder);border-radius: var(--btnRadius);display:grid;place-items:center;user-select:none;color: var(--iconDark);overflow:hidden;cursor:pointer;-webkit-tap-highlight-color: transparent;}
    .btn.pm{font-size:clamp(20px, calc(var(--btnW) * 0.48), 26px);font-weight:700;line-height:1;}
    .btn.close{font-size:clamp(18px, calc(var(--btnW) * 0.40), 22px);font-weight:800;line-height:1;}
    .rbBall{width: clamp(20px, calc(var(--btnW) * 0.50), 26px);height: clamp(20px, calc(var(--btnW) * 0.50), 26px);border-radius:50%;background: radial-gradient(circle at 30% 28%, rgba(255,255,255,.55), transparent 35%), linear-gradient(135deg, #c00000 0 50%, #111111 50% 100%);} 

    .iconSvg{width:30px;height:30px;display:block;color:var(--iconDark);}
    .iconSvg *{fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;vector-effect: non-scaling-stroke;}
    .iconSvg .fillDot{fill:currentColor;stroke:none;}
    .btn .iconSvg{width: clamp(22px, calc(var(--btnW) * 0.55), 30px);height: clamp(22px, calc(var(--btnW) * 0.55), 30px);} 

    @media (max-width: 380px){
      :root{ --scoreBigSize:80px; }
      .name{font-size:28px;}
      .sideName{font-size:26px;}
      .statusPill{ font-size:15px; gap:10px; padding:7px 12px; }
      .clockSvg{width:28px;height:28px;}
    }
  </style>
</head>
<body>
  <div class="phone">

    <div class="topbar">
      <div class="statusPill" title="Status">
        <svg class="clockSvg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="8.5"></circle>
          <path d="M12 12 L12 7.5"></path>
          <path d="M12 12 L15.3 13.8"></path>
          <circle class="dot" cx="12" cy="12" r="1"></circle>
        </svg>
        <span>ETS Tisch – 4 Spieler</span>
      </div>
    </div>

    <div class="content">
      <div class="zone-top">
        <div class="panelWrap rot-top">
          <div class="rowTopBottom">
            <div id="name_TOP" class="name">—</div>
            <div class="scoreBig numBlack">0</div>
            <div class="scoreSmall numBlack">(0)</div>
          </div>
        </div>
      </div>

      <div class="zone-mid">
        <div class="mid-left">
          <div class="panelWrap rot-left">
            <div class="colSide">
              <div id="name_LEFT" class="sideName">—</div>
              <div class="sideScoreRow">
                <div class="scoreBig numBlack" style="margin-left:0;">0</div>
                <div class="scoreSmall numBlack" style="margin-left:0;">(0)</div>
              </div>
            </div>
          </div>
        </div>

        <div class="centerLine"></div>

        <div class="mid-right">
          <div class="panelWrap rot-right">
            <div class="colSide">
              <div id="name_RIGHT" class="sideName">—</div>
              <div class="sideScoreRow">
                <div class="scoreBig numBlack" style="margin-left:0;">0</div>
                <div class="scoreSmall numBlack" style="margin-left:0;">(0)</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="zone-bottom">
        <div class="panelWrap rot-bot">
          <div class="rowTopBottom">
            <div id="name_BOTTOM" class="name">—</div>
            <div class="scoreBig numBlack">0</div>
            <div class="scoreSmall numBlack">(0)</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottombar">
      <div class="bottom-left">
        <div class="btn" title="Statistik" aria-label="Statistik">
          <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5H20"></path><path d="M7 19.5V11"></path><path d="M12 19.5V6.5"></path><path d="M17 19.5V14"></path></svg>
        </div>
        <div class="btn" title="Liste" aria-label="Liste">
          <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7H20"></path><path d="M7 12H20"></path><path d="M7 17H20"></path><circle class="fillDot" cx="4" cy="7" r="1"></circle><circle class="fillDot" cx="4" cy="12" r="1"></circle><circle class="fillDot" cx="4" cy="17" r="1"></circle></svg>
        </div>
      </div>
      <div class="bottom-mid">
        <div class="btn pm" title="Positivspiel (+)" aria-label="Positivspiel">+</div>
        <div class="btn pm" title="Negativspiel (−)" aria-label="Negativspiel">−</div>
        <div class="btn" title="Farbenspiel" aria-label="Farbenspiel"><div class="rbBall"></div></div>
      </div>
      <div class="bottom-right">
        <div class="btn" title="Korrigieren" aria-label="Korrigieren">
          <svg class="iconSvg" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.7"></path><path d="M20 5v4h-4"></path></svg>
        </div>
        <div class="btn close" title="Schließen" aria-label="Schließen">✕</div>
      </div>
    </div>

  </div>

  <script>
    (function(){
      const btn = document.querySelector('.btn.close');
      if(!btn) return;
      btn.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        if (confirm('Tisch wirklich beenden?')) {
          window.location.href = 'index.html';
        }
      }, {passive:false});
    })();
  </script>

<script>
(function(){
  try {
    const raw = sessionStorage.getItem('currentTable');
    if(!raw){ window.location.href='index.html'; return; }
    const ct = JSON.parse(raw);
    if(!ct || Number(ct.tableType)!==4){ window.location.href='index.html'; return; }
    const seats = ct.seats || {};
    const DB_NAME='ets_db', DB_VERSION=1, STORE_PLAYERS='players';
    function openDb(){ return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,DB_VERSION); r.onupgradeneeded=()=>{}; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
    function getPlayer(db,id){ return new Promise((res,rej)=>{ const tx=db.transaction(STORE_PLAYERS,'readonly'); const st=tx.objectStore(STORE_PLAYERS); const rq=st.get(Number(id)); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }
    function setText(sel, text){ const el=document.querySelector(sel); if(el) el.textContent=text; }
    openDb().then(async db=>{
      const id_TOP = seats['TOP'];
      if(id_TOP==null){ setText('#name_TOP', '—'); } else {
        const p_TOP = await getPlayer(db, id_TOP).catch(()=>null);
        if(p_TOP && (p_TOP.nachname||p_TOP.vorname)){ setText('#name_TOP', ((p_TOP.nachname||'') + ' ' + (p_TOP.vorname||'')).trim()); } else { setText('#name_TOP', String(id_TOP)); }
      }
      const id_LEFT = seats['LEFT'];
      if(id_LEFT==null){ setText('#name_LEFT', '—'); } else {
        const p_LEFT = await getPlayer(db, id_LEFT).catch(()=>null);
        if(p_LEFT && (p_LEFT.nachname||p_LEFT.vorname)){ setText('#name_LEFT', ((p_LEFT.nachname||'') + ' ' + (p_LEFT.vorname||'')).trim()); } else { setText('#name_LEFT', String(id_LEFT)); }
      }
      const id_RIGHT = seats['RIGHT'];
      if(id_RIGHT==null){ setText('#name_RIGHT', '—'); } else {
        const p_RIGHT = await getPlayer(db, id_RIGHT).catch(()=>null);
        if(p_RIGHT && (p_RIGHT.nachname||p_RIGHT.vorname)){ setText('#name_RIGHT', ((p_RIGHT.nachname||'') + ' ' + (p_RIGHT.vorname||'')).trim()); } else { setText('#name_RIGHT', String(id_RIGHT)); }
      }
      const id_BOTTOM = seats['BOTTOM'];
      if(id_BOTTOM==null){ setText('#name_BOTTOM', '—'); } else {
        const p_BOTTOM = await getPlayer(db, id_BOTTOM).catch(()=>null);
        if(p_BOTTOM && (p_BOTTOM.nachname||p_BOTTOM.vorname)){ setText('#name_BOTTOM', ((p_BOTTOM.nachname||'') + ' ' + (p_BOTTOM.vorname||'')).trim()); } else { setText('#name_BOTTOM', String(id_BOTTOM)); }
      }
      db.close();
    }).catch(()=>{ window.location.href='index.html'; });
  } catch(e){ window.location.href='index.html'; }
})();
</script>
</body>
</html>
