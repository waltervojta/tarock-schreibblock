<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ETS – Gabenergebnis</title>

  <!--
    ETS – Elektronischer Tarock Schreibblock
    SCREEN: Gabenergebnis (STC)
    INPUT:
      - sessionStorage.selectedGame = { code, value, category }
      - IndexedDB current_session (key="current") liefert Tisch (tableType, seats, ccwOrder)
      - IndexedDB players liefert Namen
      - IndexedDB current_state (key="current") liefert lastGabeNr, totals, lastDelta
    OUTPUT:
      - STORE_GABEN: neue Gabe (gabeNr, game, players, premiums, kontra, deltaByPlayerId, createdUtc)
      - STORE_CURR_STATE: totals + lastDelta aktualisiert, lastGabeNr++

    TEAM-LOGIK FINAL:
      - Aktive Spieler pro Gabe:
          4er: alle 4 aktiv
          5er: Geber pausiert
          6er: Geber + diagonal gegenüber pausieren
        -> Pausierer erhalten Delta=0
      - Team-Modi:
          Standard: 1 vs (N-1) (N=aktive Spieler)
          Selberrufer/Rufer: optional Partner => 2vs2 oder 1vs3
          Trischaken & Negativ: immer 1vs3 (Partner deaktiviert)
          Sechserdreier (V): Spezialverteilung (+12/-4 bzw -24/+8) über aktive Spieler
      - Prämienverteilung (team-konsistent):
          1vs3: Ansager +ev*(N-1), jeder Gegner -ev
          2vs2: Team je +ev, Gegner je -ev
        (ev enthält still/angesagt, solo×2, kontra/re/sub)

    UX:
      - Spielwert: Klick toggelt Gewinn/Verlust (Vorzeichen), bei Sechserdreier Spezialmodus.
      - Kontra/Re/Sub: Button zyklisch AUS → Kontra → Re → Sub → AUS ... danach Ziel wählen (Spiel oder Prämie).
  -->

  <style>
    :root{
      --bg:#cfe9ff;
      --panel:#cfe9ff;
      --barBg:#3b6fa8;
      --line:#000;
      --lineW:3px;
      --font: Arial, sans-serif;
      --black:#000;
      --red:#c00000;
      --btnBorder:rgba(0,0,0,.70);
      --btnRadius:10px;
      --iconDark:rgba(0,0,0,.92);
      --padX:12px;

      --cardBg: rgba(255,255,255,.60);
      --chipBg: rgba(255,255,255,.18);
      --chipBorder: rgba(0,0,0,.25);
      --softBorder: rgba(0,0,0,.20);
      --disabledOpacity: .35;
    }

    *{box-sizing:border-box;}
    html,body{height:100%; overflow:hidden;}
    body{
      margin:0;
      background:var(--bg);
      font-family:var(--font);
      display:flex;
      justify-content:center;
      color:var(--black);
    }
    .phone{
      width:min(480px,100%);
      height:100dvh;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* Topbar */
    .topbar{
      height: calc(58px + env(safe-area-inset-top));
      padding: calc(8px + env(safe-area-inset-top)) var(--padX) 8px var(--padX);
      background:var(--barBg);
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
    }
    .titleWrap{min-width:0;display:flex;flex-direction:column;gap:2px;}
    .title{
      font-size:16px;
      font-weight:900;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.1;
    }
    .subtitle{
      font-size:11px;
      font-weight:700;
      color:rgba(255,255,255,.85);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pill{
      flex:0 0 auto;
      height:30px;
      padding:0 10px;
      border-radius:10px;
      background:var(--chipBg);
      border:1px solid var(--chipBorder);
      display:flex;
      align-items:center;
      gap:8px;
      color:#fff;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }

    /* Content */
    .content{
      flex:1 1 auto;
      min-height:0;
      padding:12px var(--padX);
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }
    .card{
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      background:var(--cardBg);
      overflow:hidden;
    }
    .cardHeader{
      padding:10px 10px;
      border-bottom:1px solid var(--softBorder);
      background:rgba(0,0,0,.03);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:900;
    }
    .cardBody{ padding:10px; display:flex; flex-direction:column; gap:10px; }

    /* Game line */
    .gameLine{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      background:#fff;
      border:1px solid rgba(0,0,0,.35);
      border-radius:10px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .gameName{
      min-width:0;
      font-weight:900;
      font-size:15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .gameValue{
      font-weight:900;
      font-size:18px;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.25);
      background:rgba(59,111,168,.12);
      cursor:pointer;
      white-space:nowrap;
    }

    .hintSmall{
      font-size:11px;
      font-weight:800;
      color:rgba(0,0,0,.65);
    }

    .numRed{color:var(--red)!important;}
    .numBlack{color:var(--black)!important;}

    /* Player selection */
    .playerGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .pbtn{
      padding:10px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.35);
      background:#fff;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-width:0;
    }
    .pbtn:active{transform:translateY(1px);}
    .pbtn .pname{
      min-width:0;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pbtn .ptag{
      font-size:11px;
      font-weight:900;
      color:rgba(0,0,0,.65);
      white-space:nowrap;
    }
    .pbtn.selectedPrimary{background:rgba(59,111,168,.18); border-color:rgba(59,111,168,.85);}
    .pbtn.selectedSecondary{background:rgba(255,230,90,.55); border-color:rgba(0,0,0,.35);}

    .pbtn.paused{
      opacity:.38;
      cursor:default;
      background:rgba(255,255,255,.35);
    }

    .chip{
      border:1px solid rgba(0,0,0,.25);
      background:rgba(255,255,255,.55);
      border-radius:10px;
      padding:6px 10px;
      font-size:12px;
      font-weight:900;
      color:rgba(0,0,0,.80);
      white-space:nowrap;
    }

    /* Premiums list */
    .premRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      background:#fff;
      border:1px solid rgba(0,0,0,.25);
      border-radius:10px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .premRow:active{transform:translateY(1px);}
    .premLeft{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .premName{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .premMeta{
      font-size:11px;
      font-weight:800;
      color:rgba(0,0,0,.60);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .premVal{
      font-weight:900;
      font-size:16px;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.20);
      background:rgba(0,0,0,.04);
      white-space:nowrap;
      min-width:70px;
      text-align:right;
    }
    .premRow.disabled{
      opacity:.35;
      cursor:default;
    }

    /* Kontra mode highlight */
    .targetable{
      outline:2px dashed rgba(59,111,168,0);
      outline-offset:2px;
    }
    .kontraPending .targetable{
      outline-color: rgba(59,111,168,.85);
    }
    .kontraBadge{
      font-size:11px;
      font-weight:900;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.20);
      background:rgba(59,111,168,.12);
      white-space:nowrap;
    }
    .btnRow{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .btnAction{
      flex:1 1 auto;
      height:44px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      background:rgba(59,111,168,.14);
      color:rgba(0,0,0,.88);
      font-size:14px;
      font-weight:900;
    }
    .btnAction:disabled{ opacity:.45; cursor:default; }

    /* Bottom actions */
    .bottombar{
      height: calc(62px + env(safe-area-inset-bottom));
      background:var(--barBg);
      border-top:var(--lineW) solid var(--line);
      padding: 8px var(--padX) calc(8px + env(safe-area-inset-bottom)) var(--padX);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex:0 0 auto;
    }
    .actionBtn{
      flex:1 1 auto;
      height:46px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      background:rgba(255,255,255,.20);
      color:#fff;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .actionBtn.primary{ background:rgba(255,255,255,.26); }
    .actionBtn:disabled{opacity:.45;cursor:default;}
    .actionBtn:active:not(:disabled){transform:translateY(1px);}

    /* Summary */
    .sumList{ display:flex; flex-direction:column; gap:8px; }
    .sumRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:8px 10px;
      border-radius:10px;
      background:rgba(255,255,255,.55);
      border:1px solid rgba(0,0,0,.15);
      font-weight:900;
    }
    .sumRow .who{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .sumRow .val{white-space:nowrap;}
    .sumCheck{
      font-size:12px;
      font-weight:900;
      color:rgba(0,0,0,.75);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding-top:4px;
    }
  </style>
</head>

<body>
  <div class="phone" id="root">
    <div class="topbar">
      <div class="titleWrap">
        <div class="title">Gabe erfassen</div>
        <div id="sub" class="subtitle">—</div>
      </div>
      <div class="pill"><span id="gabeInfo">Gabe …</span></div>
    </div>

    <div class="content" id="content">
      <!-- Spiel -->
      <div class="card" id="cardGame">
        <div class="cardHeader">
          <div>Spiel</div>
          <div class="kontraBadge" id="kontraHint">Kontra: AUS</div>
        </div>
        <div class="cardBody">
          <div class="gameLine targetable" id="gameTarget">
            <div class="gameName" id="gameName">—</div>
            <div class="gameValue" id="gameValue">0</div>
          </div>
          <div class="hintSmall" id="gameHint">
            Tipp: Klick auf den Wert toggelt Gewinn/Verlust. Kontra → Ziel wählen.
          </div>
          <div class="btnRow">
            <button class="btnAction" id="btnKontra" type="button">Kontra (AUS)</button>
            <div class="chip" id="teamHint">Team: —</div>
          </div>
          <div class="hintSmall" id="pauseHint">—</div>
        </div>
      </div>

      <!-- Spieler -->
      <div class="card">
        <div class="cardHeader">
          <div>Spieler</div>
          <div class="hintSmall" id="playerReqHint">—</div>
        </div>
        <div class="cardBody">
          <div class="hintSmall" id="playerHint">
            Spieler 1 = Ansager. Bei Selberrufer/Rufer optional Partner wählen (2vs2) – sonst bleibt es 1vs3.
          </div>
          <div class="playerGrid" id="playerGrid"></div>
        </div>
      </div>

      <!-- Prämien -->
      <div class="card">
        <div class="cardHeader">
          <div>Prämien</div>
          <div class="hintSmall" id="soloHint">—</div>
        </div>
        <div class="cardBody" id="premList"></div>
      </div>

      <!-- Zusammenfassung -->
      <div class="card">
        <div class="cardHeader">
          <div>Ergebnis dieser Gabe</div>
          <div class="hintSmall" id="sumForPrimary">—</div>
        </div>
        <div class="cardBody">
          <div class="sumList" id="sumList"></div>
          <div class="sumCheck">
            <div id="sumZero">Summe: —</div>
            <div id="sumWarn"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottombar">
      <button id="btnCancel" class="actionBtn" type="button">Zurück</button>
      <button id="btnSave" class="actionBtn primary" type="button" disabled>Übernehmen</button>
    </div>
  </div>

  <script>
    /* =========================================================
      Konstanten / Konfiguration
    ========================================================= */
    const DB_NAME = 'ets_db';
    const DB_VERSION = 2;
    const STORE_PLAYERS = 'players';
    const STORE_CURR_SESSION = 'current_session';
    const STORE_CURR_STATE = 'current_state';
    const STORE_GABEN = 'gaben';
    const CURR_KEY = 'current';

    const GAME_LABELS = {
      KOENIG_RUFER: '(König)Rufer (V)',
      SOLO_RUFER: 'Solorufer',
      PAGATRUFER: 'Pagatrufer',
      SECHSERDREIER: 'Sechserdreier (V)',
      UHU_RUFER: 'Uhurufer',
      DREIER: 'Dreier',
      KAKADU_RUFER: 'Kakadurufer',
      QUAPIL_RUFER: 'Quapilrufer',
      SOLO_DREIER: 'Solodreier',
      TRISCHAKEN: 'Trischaken (V)',
      PICCOLO: 'Piccolo',
      ZWICCOLO: 'Zwiccolo',
      BETTLER: 'Bettler',
      PICCOLO_OUVERT: 'Piccolo ouvert',
      ZWICCOLO_OUVERT: 'Zwiccolo ouvert',
      BETTLER_OUVERT: 'Bettler ouvert',
      FARBENDREIER: 'Farbendreier',
      FARBENSOLO: 'Farbensolo'
    };

    // "Selberrufer/Rufer"-Spiele: optional Partner (2vs2) oder ohne Partner (1vs3)
    const SELBER_RUFER_GAMES = new Set([
      'KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER'
    ]);

    // Solo-Spiele (Prämien von Haus aus ×2)
    const SOLO_GAMES = new Set(['SOLO_RUFER','SOLO_DREIER','FARBENSOLO']);

    // Negativ-Spiele (Partner nie erlaubt)
    const NEGATIVE_GAMES = new Set([
      'TRISCHAKEN','PICCOLO','ZWICCOLO','BETTLER',
      'PICCOLO_OUVERT','ZWICCOLO_OUVERT','BETTLER_OUVERT'
    ]);

    // Prämienkatalog (STC)
    const PREMIUMS = [
      { key:'PAGAT_ULTIMO', label:'Pagat ultimo', base:1 },
      { key:'UHU', label:'Uhu', base:2 },
      { key:'KAKADU', label:'Kakadu', base:3 },
      { key:'QUAPIL', label:'Quapil', base:4 },
      { key:'KOENIG_ULT', label:'König ultimo', base:1 },
      { key:'TRULL', label:'Trull', base:1 },
      { key:'VIER_KOENIGE', label:'4 Könige', base:1 },
      { key:'VALAT', label:'Valat', base:10 }
    ];

    // Minimal-Regel: Ultimo nur bei Rufer-/SoloRufer-Games aktiv.
    function premiumAllowed(gameCode, premKey){
      const isUltimo = (premKey === 'PAGAT_ULTIMO' || premKey === 'KOENIG_ULT');
      if(!isUltimo) return true;
      return ['KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER','SOLO_RUFER'].includes(gameCode);
    }

    /* =========================================================
      State
    ========================================================= */
    let selectedGame = null;      // {code,value,category}
    let sess = null;              // current_session
    let currState = null;         // current_state

    // all players at table
    let seatPlayers = [];         // [{seat, playerId, displayName}]

    // computed per gabe:
    let gabeNr = 1;
    let activeSeatPlayers = [];   // subset of seatPlayers (non-paused)
    let pausedSeatSet = new Set(); // paused seat keys
    let pausedPlayerIdSet = new Set(); // paused playerIds

    // selected players for the game
    let primaryId = null;
    let secondaryId = null;

    // game state
    let gameSign = +1;            // +1 win / -1 loss (normal)
    let sechserMode = 'WIN';      // WIN / LOSS for Sechserdreier
    let gameKontraLevel = 0;      // applied to game 0..3

    // premiums
    let premState = {};           // premKey -> 0..4
    let premKontra = {};          // premKey -> 0..3

    // kontra selection stage
    let kontraStage = 0;
    let kontraPending = false;

    /* =========================================================
      DOM
    ========================================================= */
    const root = document.getElementById('root');
    const sub = document.getElementById('sub');
    const gabeInfoEl = document.getElementById('gabeInfo');

    const gameNameEl = document.getElementById('gameName');
    const gameValueEl = document.getElementById('gameValue');
    const gameHintEl = document.getElementById('gameHint');
    const teamHintEl = document.getElementById('teamHint');
    const pauseHintEl = document.getElementById('pauseHint');

    const playerGrid = document.getElementById('playerGrid');
    const playerReqHint = document.getElementById('playerReqHint');

    const premList = document.getElementById('premList');
    const soloHint = document.getElementById('soloHint');

    const kontraHint = document.getElementById('kontraHint');
    const btnKontra = document.getElementById('btnKontra');

    const btnCancel = document.getElementById('btnCancel');
    const btnSave = document.getElementById('btnSave');

    const sumList = document.getElementById('sumList');
    const sumZero = document.getElementById('sumZero');
    const sumWarn = document.getElementById('sumWarn');
    const sumForPrimary = document.getElementById('sumForPrimary');

    const gameTarget = document.getElementById('gameTarget');

    /* =========================================================
      Helpers
    ========================================================= */
    function esc(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    function kontraFactor(level){
      if(level === 1) return 2;
      if(level === 2) return 4;
      if(level === 3) return 8;
      return 1;
    }
    function kontraLabel(level){
      if(level === 1) return 'Kontra';
      if(level === 2) return 'Re';
      if(level === 3) return 'Sub';
      return 'AUS';
    }
    function stageNext(level){
      return (level + 1) % 4;
    }

    function isSoloGame(){
      return !!(selectedGame && SOLO_GAMES.has(selectedGame.code));
    }
    function isNegativeGame(){
      return !!(selectedGame && NEGATIVE_GAMES.has(selectedGame.code));
    }
    function isSelberRuferGame(){
      return !!(selectedGame && SELBER_RUFER_GAMES.has(selectedGame.code));
    }
    function allowsPartner(){
      // Partner nur bei Selberrufer/Rufer und nicht bei Sechserdreier/Negativ
      if(!selectedGame) return false;
      if(selectedGame.code === 'SECHSERDREIER') return false;
      if(isNegativeGame()) return false;
      return isSelberRuferGame();
    }

    function playerNameById(id){
      const p = seatPlayers.find(x => x.playerId === id);
      return p ? p.displayName : String(id);
    }

    function preferredSeatOrderByTableType(t){
      if(t === 4) return ['TOP','LEFT','RIGHT','BOTTOM'];
      if(t === 5) return ['LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
      if(t === 6) return ['TOP','LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
      return ['TOP','LEFT','RIGHT','BOTTOM','LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
    }

    function seatOrderFromSession(){
      const seatsObj = (sess && sess.seats) ? sess.seats : {};
      const keys = Object.keys(seatsObj);
      const t = Number(sess && sess.tableType) || 4;
      const pref = preferredSeatOrderByTableType(t);

      keys.sort((a,b) => {
        const ia = pref.indexOf(a);
        const ib = pref.indexOf(b);
        const sa = (ia === -1) ? 999 : ia;
        const sb = (ib === -1) ? 999 : ib;
        if(sa !== sb) return sa - sb;
        return a.localeCompare(b);
      });

      return keys;
    }

    function getCcwOrder(){
      // use session-stored order when present; otherwise fallback by tableType
      if(sess && Array.isArray(sess.ccwOrder) && sess.ccwOrder.length){
        return sess.ccwOrder.slice();
      }
      const t = Number(sess && sess.tableType) || 4;
      if(t === 5) return ['BOTTOM','RIGHT_BOTTOM','RIGHT_TOP','LEFT_TOP','LEFT_BOTTOM'];
      if(t === 6) return ['BOTTOM','RIGHT_BOTTOM','RIGHT_TOP','TOP','LEFT_TOP','LEFT_BOTTOM'];
      return ['BOTTOM','RIGHT','TOP','LEFT'];
    }

    function computeDealerSeat(nextGabeNr){
      const ccw = getCcwOrder();
      const idx = (nextGabeNr - 1) % ccw.length;
      return ccw[idx];
    }

    function computePausedSeats(nextGabeNr){
      const t = Number(sess && sess.tableType) || 4;
      const dealer = computeDealerSeat(nextGabeNr);
      const paused = new Set();

      if(t === 5){
        paused.add(dealer);
      } else if(t === 6){
        paused.add(dealer);
        // diagonal gegenüber (wie 6er-Screen)
        const opposite = {
          TOP:'BOTTOM',
          BOTTOM:'TOP',
          LEFT_TOP:'RIGHT_BOTTOM',
          RIGHT_BOTTOM:'LEFT_TOP',
          RIGHT_TOP:'LEFT_BOTTOM',
          LEFT_BOTTOM:'RIGHT_TOP'
        };
        const opp = opposite[dealer];
        if(opp) paused.add(opp);
      }
      return paused;
    }

    function refreshActivePlayers(){
      pausedSeatSet = computePausedSeats(gabeNr);
      pausedPlayerIdSet = new Set();

      for(const sp of seatPlayers){
        if(pausedSeatSet.has(sp.seat)){
          pausedPlayerIdSet.add(sp.playerId);
        }
      }

      activeSeatPlayers = seatPlayers.filter(sp => !pausedSeatSet.has(sp.seat));
    }

    function activePlayerIds(){
      return activeSeatPlayers.map(p => p.playerId);
    }

    function ensureSelectionsValid(){
      // if selected primary/secondary are paused, clear them
      if(primaryId != null && pausedPlayerIdSet.has(primaryId)) primaryId = null;
      if(secondaryId != null && pausedPlayerIdSet.has(secondaryId)) secondaryId = null;
      // if partner not allowed, clear secondary
      if(!allowsPartner()) secondaryId = null;
      // if partner equals primary
      if(primaryId != null && secondaryId === primaryId) secondaryId = null;
    }

    function buildTeamIds(){
      const team = [];
      if(primaryId != null) team.push(primaryId);
      if(allowsPartner() && secondaryId != null) team.push(secondaryId);
      return team;
    }

    function opponentsOfTeam(teamIds){
      const teamSet = new Set((teamIds || []).filter(x => x != null));
      return activeSeatPlayers
        .map(p => p.playerId)
        .filter(id => id != null && !teamSet.has(id));
    }

    function fmtSigned(n){
      const v = Number(n) || 0;
      return String(v);
    }

    function mergeDelta(a,b){
      const out = {};
      for(const k in a) out[k] = (Number(out[k]) || 0) + (Number(a[k]) || 0);
      for(const k in b) out[k] = (Number(out[k]) || 0) + (Number(b[k]) || 0);
      return out;
    }

    /* =========================================================
      IndexedDB
    ========================================================= */
    function openDb(){
      return new Promise((resolve,reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {};
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function idbGet(db, store, key){
      return new Promise((resolve,reject) => {
        const tx = db.transaction(store,'readonly');
        const st = tx.objectStore(store);
        const rq = st.get(key);
        rq.onsuccess = () => resolve(rq.result);
        rq.onerror = () => reject(rq.error);
      });
    }

    function idbGetPlayer(db, id){
      return new Promise((resolve,reject) => {
        const tx = db.transaction(STORE_PLAYERS,'readonly');
        const st = tx.objectStore(STORE_PLAYERS);
        const rq = st.get(Number(id));
        rq.onsuccess = () => resolve(rq.result);
        rq.onerror = () => reject(rq.error);
      });
    }

    /* =========================================================
      Init / Navigation
    ========================================================= */
    btnCancel.addEventListener('click', () => {
      if(history.length > 1) history.back();
      else window.location.href = 'index.html';
    });

    window.addEventListener('load', async () => {
      // load selectedGame
      try{
        selectedGame = JSON.parse(sessionStorage.getItem('selectedGame') || 'null');
      } catch {
        selectedGame = null;
      }

      if(!selectedGame || !selectedGame.code){
        if(history.length > 1) history.back();
        else window.location.href = 'index.html';
        return;
      }

      // defaults
      gameSign = +1;
      sechserMode = 'WIN';
      gameKontraLevel = 0;
      kontraStage = 0;
      kontraPending = false;

      PREMIUMS.forEach(p => {
        premState[p.key] = 0;
        premKontra[p.key] = 0;
      });

      // load session/state
      const db = await openDb();
      sess = await idbGet(db, STORE_CURR_SESSION, CURR_KEY);
      currState = await idbGet(db, STORE_CURR_STATE, CURR_KEY);

      if(!sess || !sess.tableType || !sess.seats){
        db.close();
        window.location.href = 'index.html';
        return;
      }

      gabeNr = (currState && Number.isFinite(currState.lastGabeNr)) ? (Number(currState.lastGabeNr) + 1) : 1;
      gabeInfoEl.textContent = 'Gabe ' + gabeNr;

      const gameLabel = GAME_LABELS[selectedGame.code] || selectedGame.code;
      sub.textContent = 'Spiel: ' + gameLabel + ' (' + String(selectedGame.category || '') + ')';

      // build seatPlayers with names
      seatPlayers = [];
      const seatKeys = seatOrderFromSession();
      for(const seat of seatKeys){
        const pid = sess.seats[seat];
        if(pid == null) continue;

        const pl = await idbGetPlayer(db, pid).catch(() => null);
        let disp = String(pid);
        if(pl){
          const nach = String(pl.nachname || '').trim();
          const vor = String(pl.vorname || '').trim();
          disp = (nach + ' ' + vor).trim() || String(pid);
        }
        seatPlayers.push({ seat, playerId: Number(pid), displayName: disp });
      }
      db.close();

      // compute active/paused
      refreshActivePlayers();
      ensureSelectionsValid();

      // render & bind
      renderGameHeader();
      renderPlayers();
      renderPremiums();
      recomputeAndRender();

      // events
      gameValueEl.addEventListener('click', () => {
        if(selectedGame.code === 'SECHSERDREIER'){
          sechserMode = (sechserMode === 'WIN') ? 'LOSS' : 'WIN';
        } else {
          gameSign = (gameSign === 1) ? -1 : 1;
        }
        recomputeAndRender();
      });

      btnKontra.addEventListener('click', () => {
        kontraStage = stageNext(kontraStage);
        kontraPending = true;
        updateKontraUi();
      });

      gameTarget.addEventListener('click', () => {
        if(!kontraPending) return;
        gameKontraLevel = kontraStage;
        kontraPending = false;
        updateKontraUi();
        recomputeAndRender();
      });

      btnSave.addEventListener('click', onSave);
    });

    /* =========================================================
      Render
    ========================================================= */
    function renderGameHeader(){
      const label = GAME_LABELS[selectedGame.code] || selectedGame.code;
      gameNameEl.textContent = label;

      const t = Number(sess && sess.tableType) || 4;
      const dealerSeat = computeDealerSeat(gabeNr);
      const pausedSeatsArr = Array.from(pausedSeatSet);
      pauseHintEl.textContent = (t === 4)
        ? 'Aktiv: alle Spieler (4er)'
        : 'Pause: ' + pausedSeatsArr.join(', ') + ' | Geber: ' + dealerSeat;

      if(selectedGame.code === 'SECHSERDREIER'){
        teamHintEl.textContent = 'Modus: ' + (sechserMode === 'WIN' ? 'Gewinn' : 'Verlust') + ' (1vs' + (activeSeatPlayers.length-1) + ')';
        gameHintEl.textContent = 'Sechserdreier: Klick toggelt Gewinn/Verlust-Modus. Kontra → Ziel wählen.';
      } else if(allowsPartner()){
        teamHintEl.textContent = 'Team: optional Partner (2vs2 oder 1vs' + (activeSeatPlayers.length-1) + ')';
        gameHintEl.textContent = 'Klick auf Wert toggelt Gewinn/Verlust. Kontra → Ziel wählen. Partner optional.';
      } else {
        teamHintEl.textContent = 'Team: 1 vs ' + (activeSeatPlayers.length-1);
        gameHintEl.textContent = 'Klick auf Wert toggelt Gewinn/Verlust. Kontra → Ziel wählen.';
      }

      soloHint.textContent = isSoloGame() ? 'Solo: alle Prämien ×2 (automatisch)' : '—';
      updateKontraUi();
    }

    function renderPlayers(){
      playerGrid.innerHTML = '';

      if(selectedGame.code === 'SECHSERDREIER'){
        playerReqHint.textContent = 'Wähle Spieler 1 (Alleinspieler). (Aktiv: ' + activeSeatPlayers.length + ')';
      } else if(allowsPartner()){
        playerReqHint.textContent = 'Wähle Spieler 1 (Ansager). Partner optional (2vs2). (Aktiv: ' + activeSeatPlayers.length + ')';
      } else {
        playerReqHint.textContent = 'Wähle Spieler 1 (Ansager/Alleinspieler). (Aktiv: ' + activeSeatPlayers.length + ')';
      }

      // show all table players, but disable paused
      for(const p of seatPlayers){
        const isPaused = pausedSeatSet.has(p.seat) || pausedPlayerIdSet.has(p.playerId);

        const b = document.createElement('div');
        b.className = 'pbtn' + (isPaused ? ' paused' : '');
        b.dataset.pid = String(p.playerId);
        b.dataset.paused = isPaused ? '1' : '0';

        const tag = isPaused ? (p.seat + ' · PAUSE') : p.seat;
        b.innerHTML = `<div class="pname">${esc(p.displayName)}</div><div class="ptag">${esc(tag)}</div>`;

        b.addEventListener('click', () => {
          if(b.dataset.paused === '1') return;

          const pid = Number(b.dataset.pid);

          // selection logic:
          // primary: first click
          // secondary: only if partner allowed; can set/unset
          if(primaryId === pid){
            primaryId = null;
            secondaryId = null;
          } else if(secondaryId === pid){
            secondaryId = null;
          } else if(primaryId == null){
            primaryId = pid;
          } else if(allowsPartner() && secondaryId == null && pid !== primaryId){
            secondaryId = pid;
          } else {
            // replace behavior
            if(!allowsPartner()){
              primaryId = pid;
              secondaryId = null;
            } else {
              // if partner allowed and already have primary:
              // if we have secondary -> replace secondary, else set secondary
              if(pid !== primaryId){
                secondaryId = pid;
              }
            }
          }

          ensureSelectionsValid();
          updatePlayerButtons();
          recomputeAndRender();
        });

        playerGrid.appendChild(b);
      }

      updatePlayerButtons();
    }

    function updatePlayerButtons(){
      const btns = [...playerGrid.querySelectorAll('.pbtn')];
      for(const b of btns){
        const pid = Number(b.dataset.pid);
        b.classList.remove('selectedPrimary','selectedSecondary');
        if(primaryId === pid) b.classList.add('selectedPrimary');
        if(secondaryId === pid) b.classList.add('selectedSecondary');
      }
    }

    function renderPremiums(){
      premList.innerHTML = '';

      for(const prem of PREMIUMS){
        const row = document.createElement('div');
        row.className = 'premRow targetable';
        row.dataset.pkey = prem.key;

        const allowed = premiumAllowed(selectedGame.code, prem.key);
        if(!allowed) row.classList.add('disabled');

        row.innerHTML = `
          <div class="premLeft">
            <div class="premName">${esc(prem.label)}</div>
            <div class="premMeta">${allowed ? 'aktiv' : 'inaktiv'}</div>
          </div>
          <div class="premVal" id="val_${prem.key}">0</div>
        `;

        row.addEventListener('click', () => {
          if(row.classList.contains('disabled')) return;

          if(kontraPending){
            premKontra[prem.key] = kontraStage;
            kontraPending = false;
            updateKontraUi();
            recomputeAndRender();
            return;
          }

          premState[prem.key] = (Number(premState[prem.key]) + 1) % 5;
          recomputeAndRender();
        });

        premList.appendChild(row);
      }
    }

    function updateKontraUi(){
      if(kontraPending) root.classList.add('kontraPending');
      else root.classList.remove('kontraPending');

      const stageName = kontraLabel(kontraStage);
      const appliedGame = kontraLabel(gameKontraLevel);

      btnKontra.textContent = 'Kontra (' + stageName + ') → Ziel wählen';
      kontraHint.textContent = kontraPending
        ? ('Kontra: Ziel wählen (' + stageName + ')')
        : ('Spiel-Kontra: ' + appliedGame);
    }

    /* =========================================================
      Berechnung (Team-Logic final)
    ========================================================= */
    function calcGameComponent(teamIds){
      // delta across ALL table players:
      // - active players receive computed delta
      // - paused players receive 0
      const delta = {};
      for(const sp of seatPlayers){
        delta[String(sp.playerId)] = 0;
      }

      const activeIds = activePlayerIds();
      const activeCount = activeIds.length;
      if(activeCount < 2) return delta;

      const kf = kontraFactor(gameKontraLevel);

      // Sechserdreier special distribution over ACTIVE players only
      if(selectedGame.code === 'SECHSERDREIER'){
        const solo = (teamIds && teamIds.length) ? teamIds[0] : null;
        if(solo == null) return delta;
        if(pausedPlayerIdSet.has(solo)) return delta;

        const opp = activeIds.filter(id => id !== solo);
        const oppCount = opp.length;

        // safe-guard: should be 3 opponents
        if(sechserMode === 'WIN'){
          // +12 / -4 each (scaled by kf)
          delta[String(solo)] += 12 * kf;
          for(const id of opp) delta[String(id)] -= 4 * kf;
        } else {
          // -24 / +8 each
          delta[String(solo)] -= 24 * kf;
          for(const id of opp) delta[String(id)] += 8 * kf;
        }
        return delta;
      }

      // Standard games: value distribution must sum to 0 among active
      const base = Number(selectedGame.value) || 0;
      const v = base * kf;

      const primary = (teamIds && teamIds.length) ? teamIds[0] : null;
      const partner = (teamIds && teamIds.length === 2) ? teamIds[1] : null;

      if(primary == null || pausedPlayerIdSet.has(primary)) return delta;

      // Partner is only meaningful if allowed; if not allowed ignore
      const teamSize = (allowsPartner() && partner != null && !pausedPlayerIdSet.has(partner) && partner !== primary) ? 2 : 1;

      if(teamSize === 2){
        // 2vs2 among active players:
        // team members each +sign*v
        // opponents each -sign*v
        const team = [primary, partner];
        const opp = activeIds.filter(id => id !== primary && id !== partner);
        // if not exactly 2 opponents, still behave generically
        delta[String(primary)] += gameSign * v;
        delta[String(partner)] += gameSign * v;
        for(const id of opp){
          delta[String(id)] -= gameSign * v;
        }
      } else {
        // 1vs(N-1):
        // primary +sign*v*(N-1), each opponent -sign*v
        const opp = activeIds.filter(id => id !== primary);
        const oppCount = opp.length;
        delta[String(primary)] += gameSign * v * oppCount;
        for(const id of opp){
          delta[String(id)] -= gameSign * v;
        }
      }

      return delta;
    }

    function premEffectiveValue(prem){
      const st = Number(premState[prem.key]) || 0;
      if(st === 0) return 0;

      const sign = (st === 2 || st === 4) ? -1 : 1;
      const announced = (st === 3 || st === 4) ? 2 : 1;
      const soloFactor = isSoloGame() ? 2 : 1;
      const kf = kontraFactor(Number(premKontra[prem.key]) || 0);

      return sign * prem.base * soloFactor * announced * kf;
    }

    function calcPremiumsComponent(teamIds){
      // delta across ALL table players (paused => 0)
      const delta = {};
      for(const sp of seatPlayers){
        delta[String(sp.playerId)] = 0;
      }

      const activeIds = activePlayerIds();
      const activeCount = activeIds.length;
      if(activeCount < 2) return delta;

      const primary = (teamIds && teamIds.length) ? teamIds[0] : null;
      const partner = (teamIds && teamIds.length === 2) ? teamIds[1] : null;
      if(primary == null || pausedPlayerIdSet.has(primary)) return delta;

      const teamSize = (allowsPartner() && partner != null && !pausedPlayerIdSet.has(partner) && partner !== primary) ? 2 : 1;
      const teamSet = new Set(teamSize === 2 ? [primary, partner] : [primary]);
      const opp = activeIds.filter(id => !teamSet.has(id));

      for(const prem of PREMIUMS){
        if(!premiumAllowed(selectedGame.code, prem.key)) continue;

        const ev = premEffectiveValue(prem);
        if(ev === 0) continue;

        if(teamSize === 2){
          // 2vs2: team each +ev, opp each -ev
          delta[String(primary)] += ev;
          delta[String(partner)] += ev;
          for(const id of opp){
            delta[String(id)] -= ev;
          }
        } else {
          // 1vs(N-1): primary +ev*(N-1), each opp -ev
          delta[String(primary)] += ev * opp.length;
          for(const id of opp){
            delta[String(id)] -= ev;
          }
        }
      }

      return delta;
    }

    function recomputeAndRender(){
      refreshActivePlayers();
      ensureSelectionsValid();
      renderGameHeader();
      updatePlayerButtons();

      // Game value display
      if(selectedGame.code === 'SECHSERDREIER'){
        const disp = (sechserMode === 'WIN') ? 'Gewinn' : 'Verlust';
        gameValueEl.textContent = disp;
        gameValueEl.classList.remove('numRed','numBlack');
        gameValueEl.classList.add(sechserMode === 'LOSS' ? 'numRed' : 'numBlack');
      } else {
        const v = Number(selectedGame.value) || 0;
        const disp = (gameSign === 1) ? v : -v;
        gameValueEl.textContent = String(disp);
        gameValueEl.classList.remove('numRed','numBlack');
        gameValueEl.classList.add(disp < 0 ? 'numRed' : 'numBlack');
      }

      // targetable highlight
      gameTarget.classList.add('targetable');
      [...premList.querySelectorAll('.premRow')].forEach(r => r.classList.add('targetable'));

      // team ids
      const team = buildTeamIds();

      // enable save rules:
      // - primary must be chosen and active
      // - partner is optional (never required) – except: none
      let canSave = (primaryId != null && !pausedPlayerIdSet.has(primaryId));
      // For Sechserdreier: partner never allowed
      // For others: optional partner, but if selected must be active and distinct
      if(secondaryId != null){
        if(pausedPlayerIdSet.has(secondaryId)) canSave = false;
        if(primaryId === secondaryId) canSave = false;
        if(!allowsPartner()) canSave = false;
      }
      btnSave.disabled = !canSave;

      // compute deltas
      const dGame = calcGameComponent(team);
      const dPrem = calcPremiumsComponent(team);
      const dAll = mergeDelta(dGame, dPrem);

      // update premium value displays
      for(const prem of PREMIUMS){
        const valEl = document.getElementById('val_' + prem.key);
        if(!valEl) continue;

        if(!premiumAllowed(selectedGame.code, prem.key)){
          valEl.textContent = '0';
          valEl.classList.remove('numRed','numBlack');
          valEl.classList.add('numBlack');
          continue;
        }

        const ev = premEffectiveValue(prem);
        valEl.textContent = String(ev);
        valEl.classList.remove('numRed','numBlack');
        valEl.classList.add(ev < 0 ? 'numRed' : 'numBlack');
      }

      // summary list (show all table players, paused should be 0)
      sumList.innerHTML = '';
      let sum = 0;

      for(const sp of seatPlayers){
        const v = Number(dAll[String(sp.playerId)]) || 0;
        sum += v;

        const who = sp.displayName + (pausedPlayerIdSet.has(sp.playerId) ? ' (Pause)' : '');
        const row = document.createElement('div');
        row.className = 'sumRow';
        row.innerHTML = `<div class="who">${esc(who)}</div><div class="val ${v<0?'numRed':'numBlack'}">${esc(fmtSigned(v))}</div>`;
        sumList.appendChild(row);
      }

      sumZero.textContent = 'Summe: ' + String(sum);
      sumWarn.textContent = (sum === 0) ? 'OK' : '⚠️ nicht 0';
      sumWarn.style.fontWeight = '900';
      sumWarn.style.color = (sum === 0) ? 'rgba(0,0,0,.75)' : '#c00000';

      // primary summary
      if(primaryId != null){
        const pv = Number(dAll[String(primaryId)]) || 0;
        const teamMode = (allowsPartner() && secondaryId != null) ? '2vs2' : ('1vs' + (activeSeatPlayers.length-1));
        sumForPrimary.textContent = 'Spieler 1: ' + playerNameById(primaryId) + ' → ' + String(pv) + ' (' + teamMode + ')';
      } else {
        sumForPrimary.textContent = '—';
      }
    }

    /* =========================================================
      Save (IndexedDB)
    ========================================================= */
    async function onSave(){
      if(btnSave.disabled) return;

      const team = buildTeamIds();

      const dGame = calcGameComponent(team);
      const dPrem = calcPremiumsComponent(team);
      const dAll = mergeDelta(dGame, dPrem);

      const nextGabeNr = gabeNr; // already computed
      const now = new Date().toISOString();

      const gabe = {
        gabeNr: nextGabeNr,
        createdUtc: now,
        tableType: Number(sess.tableType),
        active: {
          activeSeatCount: activeSeatPlayers.length,
          pausedSeats: Array.from(pausedSeatSet),
          pausedPlayerIds: Array.from(pausedPlayerIdSet)
        },
        game: {
          code: selectedGame.code,
          value: Number(selectedGame.value) || 0,
          category: String(selectedGame.category || ''),
          sign: (selectedGame.code === 'SECHSERDREIER') ? null : gameSign,
          sechserMode: (selectedGame.code === 'SECHSERDREIER') ? sechserMode : null,
          kontraLevel: gameKontraLevel,
          teamMode: (allowsPartner() && secondaryId != null) ? '2v2' : ('1v' + (activeSeatPlayers.length-1))
        },
        players: {
          primaryId: primaryId,
          secondaryId: (allowsPartner() ? (secondaryId || null) : null)
        },
        premiums: PREMIUMS.map(p => ({
          key: p.key,
          base: p.base,
          state: Number(premState[p.key]) || 0,
          kontraLevel: Number(premKontra[p.key]) || 0,
          allowed: premiumAllowed(selectedGame.code, p.key)
        })),
        deltaByPlayerId: dAll
      };

      const totals = (currState && currState.totalByPlayerId) ? {...currState.totalByPlayerId} : {};
      const lastD = (currState && currState.lastDeltaByPlayerId) ? {...currState.lastDeltaByPlayerId} : {};

      // update totals/lastDelta for ALL players (paused => 0)
      for(const sp of seatPlayers){
        const pid = String(sp.playerId);
        const dv = Number(dAll[pid]) || 0;
        totals[pid] = (Number(totals[pid]) || 0) + dv;
        lastD[pid] = dv;
      }

      const newState = {
        key: CURR_KEY,
        totalByPlayerId: totals,
        lastDeltaByPlayerId: lastD,
        lastGabeNr: nextGabeNr,
        updatedUtc: now
      };

      const db = await openDb();
      await new Promise((resolve,reject) => {
        const tx = db.transaction([STORE_GABEN, STORE_CURR_STATE], 'readwrite');
        tx.objectStore(STORE_GABEN).put(gabe);
        tx.objectStore(STORE_CURR_STATE).put(newState);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
      db.close();

      // navigate back to table screen
      const t = Number(sess.tableType);
      const target = (t === 4) ? '4er-Screen.html' : (t === 5) ? '5er-Screen.html' : '6er-Screen.html';
      window.location.href = target;
    }
  </script>
