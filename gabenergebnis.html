<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ETS – Gabenergebnis</title>

  <!--
    ETS – Elektronischer Tarock Schreibblock
    SCREEN: Gabenergebnis (STC)

    INPUT:
      - sessionStorage.selectedGame = { code, value, category }
      - IndexedDB current_session (key="current") liefert Tisch (tableType, seats, ccwOrder)
      - IndexedDB players liefert Namen
      - IndexedDB current_state (key="current") liefert lastGabeNr, totals, lastDelta

    OUTPUT:
      - STORE_GABEN: neue Gabe (gabeNr, game, players, premiums, deltaByPlayerId, createdUtc)
      - STORE_CURR_STATE: totals + lastDelta aktualisiert, lastGabeNr++

    TEAM-LOGIK FINAL:
      - Aktive Spieler pro Gabe:
          4er: alle aktiv
          5er: Geber pausiert
          6er: Geber + diagonal gegenüber pausieren
        -> Pausierer sind sichtbar, aber disabled; Delta=0
      - Team-Modi:
          Standard: 1 vs (N-1) (N=aktive Spieler)
          Selberrufer/Rufer: Partner optional => 2vs2 oder 1vs(N-1)
          Trischaken & Negativspiele: immer 1vs(N-1), Partner deaktiviert
          Sechserdreier (V): Spezialverteilung +12/-4 bzw -24/+8 (nur aktive Spieler)
      - Prämienverteilung team-konsistent:
          1vs(N-1): Ansager +ev*(N-1), Gegner je -ev
          2vs2: Team je +ev, Gegner je -ev
        ev enthält still/angesagt, solo×2, kontra/re/sub

    LAYOUT (Variante A, 1 Screen):
      - Oben: alle Spieler (4/5/6) sichtbar (nur Namen; Pause markiert)
      - Darunter: Spielzeile
      - Darunter: alle Prämien (kompakt)
      - Kein Scroll
  -->

  <style>
    :root{
      --bg:#cfe9ff;
      --panel:#cfe9ff;
      --barBg:#3b6fa8;
      --line:#000;
      --lineW:3px;
      --font: Arial, sans-serif;
      --black:#000;
      --red:#c00000;
      --btnBorder:rgba(0,0,0,.70);
      --btnRadius:10px;
      --padX:12px;

      --cardBg: rgba(255,255,255,.70);
      --softBorder: rgba(0,0,0,.18);
      --chipBg: rgba(255,255,255,.18);
      --chipBorder: rgba(0,0,0,.25);

      --selPrimaryBg: rgba(59,111,168,.20);
      --selPrimaryBorder: rgba(59,111,168,.95);
      --selSecondaryBg: rgba(255,230,90,.60);
      --selSecondaryBorder: rgba(0,0,0,.30);

      --pausedOpacity: .35;
    }

    *{box-sizing:border-box;}
    html,body{height:100%; overflow:hidden;}
    body{
      margin:0;
      background:var(--bg);
      font-family:var(--font);
      display:flex;
      justify-content:center;
      color:var(--black);
    }

    .phone{
      width:min(480px,100%);
      height:100dvh;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* Topbar */
    .topbar{
      height: calc(56px + env(safe-area-inset-top));
      padding: calc(8px + env(safe-area-inset-top)) var(--padX) 8px var(--padX);
      background:var(--barBg);
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
    }
    .titleWrap{min-width:0;display:flex;flex-direction:column;gap:2px;}
    .title{
      font-size:16px;
      font-weight:900;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.1;
    }
    .subtitle{
      font-size:11px;
      font-weight:700;
      color:rgba(255,255,255,.85);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pill{
      flex:0 0 auto;
      height:30px;
      padding:0 10px;
      border-radius:10px;
      background:var(--chipBg);
      border:1px solid var(--chipBorder);
      display:flex;
      align-items:center;
      gap:8px;
      color:#fff;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }

    /* Main grid: NO SCROLL, 1 screen */
    .main{
      flex:1 1 auto;
      min-height:0;
      padding:10px var(--padX);
      display:grid;
      grid-template-rows: auto auto 1fr auto; /* players, game, premiums, mini-summary */
      gap:8px;
      overflow:hidden;
    }

    /* Players block (always visible) */
    .playersBlock{
      background:var(--cardBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      padding:8px;
      overflow:hidden;
    }

    .playersGrid{
      display:grid;
      gap:6px;
      align-content:start;
    }
    /* default */
    .playersGrid{ grid-template-columns: repeat(3, 1fr); }

    /* table-specific */
    .table4 .playersGrid{ grid-template-columns: repeat(2, 1fr); }
    .table5 .playersGrid{ grid-template-columns: repeat(3, 1fr); }
    .table6 .playersGrid{ grid-template-columns: repeat(3, 1fr); }

    .pTile{
      border:1px solid rgba(0,0,0,.28);
      border-radius:10px;
      background:#fff;
      padding:8px 8px;
      min-width:0;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .pTile:active{transform:translateY(1px);}
    .pName{
      font-weight:900;
      font-size:13px;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pSeat{
      font-size:10px;
      font-weight:900;
      color:rgba(0,0,0,.60);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pTile.paused{
      opacity:var(--pausedOpacity);
      cursor:default;
      background:rgba(255,255,255,.55);
    }
    .pTile.selectedPrimary{
      background:var(--selPrimaryBg);
      border-color:var(--selPrimaryBorder);
    }
    .pTile.selectedSecondary{
      background:var(--selSecondaryBg);
      border-color:var(--selSecondaryBorder);
    }

    .miniInfoRow{
      margin-top:6px;
      display:flex;
      gap:8px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }
    .miniChip{
      border:1px solid rgba(0,0,0,.20);
      background:rgba(255,255,255,.55);
      border-radius:999px;
      padding:4px 8px;
      font-size:11px;
      font-weight:900;
      color:rgba(0,0,0,.78);
      white-space:nowrap;
    }

    /* Game row */
    .gameRow{
      background:var(--cardBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      padding:8px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .gameLine{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      border:1px solid rgba(0,0,0,.30);
      background:#fff;
      border-radius:10px;
      padding:8px 10px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      cursor:pointer;
    }
    .gameLine:active{transform:translateY(1px);}
    .gameLeft{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .gameName{
      font-weight:900;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.05;
    }
    .gameMeta{
      font-size:10px;
      font-weight:900;
      color:rgba(0,0,0,.60);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .gameValue{
      font-weight:900;
      font-size:18px;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.22);
      background:rgba(59,111,168,.12);
      white-space:nowrap;
      min-width:70px;
      text-align:right;
    }

    .numRed{color:var(--red)!important;}
    .numBlack{color:var(--black)!important;}

    .kontraRow{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .btnKontra{
      flex:1 1 auto;
      height:36px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      background:rgba(59,111,168,.14);
      color:rgba(0,0,0,.88);
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .btnKontra:active{transform:translateY(1px);}
    .btnKontra:disabled{opacity:.45;cursor:default;}
    .kontraBadge{
      font-size:11px;
      font-weight:900;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.20);
      background:rgba(255,255,255,.55);
      white-space:nowrap;
    }

    /* Premiums block (compact, no scroll inside) */
    .premBlock{
      background:var(--cardBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      padding:8px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:6px;
      min-height:0;
    }
    .premList{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:6px;
      overflow:hidden;
    }
    .premRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 10px;
      background:#fff;
      border:1px solid rgba(0,0,0,.22);
      border-radius:10px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .premRow:active{transform:translateY(1px);}
    .premRow.disabled{
      opacity:.35;
      cursor:default;
      background:rgba(255,255,255,.70);
    }
    .premLeft{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .premName{
      font-weight:900;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.05;
    }
    .premMeta{
      font-size:10px;
      font-weight:900;
      color:rgba(0,0,0,.60);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .premVal{
      font-weight:900;
      font-size:14px;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.18);
      background:rgba(0,0,0,.04);
      white-space:nowrap;
      min-width:70px;
      text-align:right;
    }

    /* Kontra pending highlight */
    .targetable{
      outline:2px dashed rgba(59,111,168,0);
      outline-offset:2px;
    }
    .kontraPending .targetable{
      outline-color: rgba(59,111,168,.85);
    }

    /* Mini summary line (no per-player list) */
    .miniSummary{
      background:rgba(255,255,255,.55);
      border:1px solid rgba(0,0,0,.20);
      border-radius:12px;
      padding:8px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:900;
      font-size:12px;
      overflow:hidden;
    }
    .miniSummary .left{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .miniSummary .right{
      white-space:nowrap;
    }

    /* Bottom actions */
    .bottombar{
      height: calc(62px + env(safe-area-inset-bottom));
      background:var(--barBg);
      border-top:var(--lineW) solid var(--line);
      padding: 8px var(--padX) calc(8px + env(safe-area-inset-bottom)) var(--padX);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex:0 0 auto;
    }
    .actionBtn{
      flex:1 1 auto;
      height:46px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      background:rgba(255,255,255,.20);
      color:#fff;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .actionBtn.primary{ background:rgba(255,255,255,.26); }
    .actionBtn:disabled{opacity:.45;cursor:default;}
    .actionBtn:active:not(:disabled){transform:translateY(1px);}

    @media (max-height: 680px){
      .pTile{ padding:7px 7px; }
      .premRow{ padding:7px 9px; }
      .gameLine{ padding:7px 9px; }
      .gameValue{ font-size:17px; }
    }
  </style>
</head>

<body>
  <div class="phone" id="root">
    <div class="topbar">
      <div class="titleWrap">
        <div class="title">Gabe erfassen</div>
        <div id="sub" class="subtitle">—</div>
      </div>
      <div class="pill"><span id="gabeInfo">Gabe …</span></div>
    </div>

    <div class="main" id="main">
      <!-- Spieler oben (immer sichtbar) -->
      <div class="playersBlock">
        <div class="playersGrid" id="playersGrid"></div>
        <div class="miniInfoRow">
          <div class="miniChip" id="playerReqHint">—</div>
          <div class="miniChip" id="pauseHint">—</div>
        </div>
      </div>

      <!-- Spielzeile -->
      <div class="gameRow">
        <div class="gameLine targetable" id="gameTarget">
          <div class="gameLeft">
            <div class="gameName" id="gameName">—</div>
            <div class="gameMeta" id="gameMeta">—</div>
          </div>
          <div class="gameValue" id="gameValue">0</div>
        </div>
        <div class="kontraRow">
          <button class="btnKontra" id="btnKontra" type="button">Kontra (AUS) → Ziel wählen</button>
          <div class="kontraBadge" id="kontraHint">Spiel-Kontra: AUS</div>
        </div>
      </div>

      <!-- Prämien -->
      <div class="premBlock">
        <div class="premList" id="premList"></div>
      </div>

      <!-- Mini Summary -->
      <div class="miniSummary">
        <div class="left" id="sumLeft">—</div>
        <div class="right" id="sumRight">—</div>
      </div>
    </div>

    <div class="bottombar">
      <button id="btnCancel" class="actionBtn" type="button">Zurück</button>
      <button id="btnSave" class="actionBtn primary" type="button" disabled>Übernehmen</button>
    </div>
  </div>

  <script>
    /* =========================================================
      Konstanten / Konfiguration
    ========================================================= */
    const DB_NAME = 'ets_db';
    const DB_VERSION = 2;
    const STORE_PLAYERS = 'players';
    const STORE_CURR_SESSION = 'current_session';
    const STORE_CURR_STATE = 'current_state';
    const STORE_GABEN = 'gaben';
    const CURR_KEY = 'current';

    const GAME_LABELS = {
      KOENIG_RUFER: '(König)Rufer (V)',
      SOLO_RUFER: 'Solorufer',
      PAGATRUFER: 'Pagatrufer',
      SECHSERDREIER: 'Sechserdreier (V)',
      UHU_RUFER: 'Uhurufer',
      DREIER: 'Dreier',
      KAKADU_RUFER: 'Kakadurufer',
      QUAPIL_RUFER: 'Quapilrufer',
      SOLO_DREIER: 'Solodreier',
      TRISCHAKEN: 'Trischaken (V)',
      PICCOLO: 'Piccolo',
      ZWICCOLO: 'Zwiccolo',
      BETTLER: 'Bettler',
      PICCOLO_OUVERT: 'Piccolo ouvert',
      ZWICCOLO_OUVERT: 'Zwiccolo ouvert',
      BETTLER_OUVERT: 'Bettler ouvert',
      FARBENDREIER: 'Farbendreier',
      FARBENSOLO: 'Farbensolo'
    };

    // Selberrufer/Rufer: Partner optional
    const SELBER_RUFER_GAMES = new Set([
      'KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER'
    ]);

    // Solo-Spiele: Prämien ×2
    const SOLO_GAMES = new Set(['SOLO_RUFER','SOLO_DREIER','FARBENSOLO']);

    // Negativ: Partner nie erlaubt
    const NEGATIVE_GAMES = new Set([
      'TRISCHAKEN','PICCOLO','ZWICCOLO','BETTLER',
      'PICCOLO_OUVERT','ZWICCOLO_OUVERT','BETTLER_OUVERT'
    ]);

    // Prämien (STC)
    const PREMIUMS = [
      { key:'PAGAT_ULTIMO', label:'Pagat ultimo', base:1 },
      { key:'UHU', label:'Uhu', base:2 },
      { key:'KAKADU', label:'Kakadu', base:3 },
      { key:'QUAPIL', label:'Quapil', base:4 },
      { key:'KOENIG_ULT', label:'König ultimo', base:1 },
      { key:'TRULL', label:'Trull', base:1 },
      { key:'VIER_KOENIGE', label:'4 Könige', base:1 },
      { key:'VALAT', label:'Valat', base:10 }
    ];

    // Ultimo minimal konservativ
    function premiumAllowed(gameCode, premKey){
      const isUltimo = (premKey === 'PAGAT_ULTIMO' || premKey === 'KOENIG_ULT');
      if(!isUltimo) return true;
      return ['KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER','SOLO_RUFER'].includes(gameCode);
    }

    /* =========================================================
      State
    ========================================================= */
    let selectedGame = null;
    let sess = null;
    let currState = null;

    let seatPlayers = [];          // all table players (with seat)
    let gabeNr = 1;

    // computed per gabe:
    let activeSeatPlayers = [];
    let pausedSeatSet = new Set();
    let pausedPlayerIdSet = new Set();

    // selection:
    let primaryId = null;
    let secondaryId = null;

    // game:
    let gameSign = +1;
    let sechserMode = 'WIN';
    let gameKontraLevel = 0;

    // premiums:
    let premState = {};            // 0..4
    let premKontra = {};           // 0..3

    // kontra selection
    let kontraStage = 0;
    let kontraPending = false;

    /* =========================================================
      DOM
    ========================================================= */
    const root = document.getElementById('root');
    const main = document.getElementById('main');

    const sub = document.getElementById('sub');
    const gabeInfoEl = document.getElementById('gabeInfo');

    const playersGrid = document.getElementById('playersGrid');
    const playerReqHint = document.getElementById('playerReqHint');
    const pauseHint = document.getElementById('pauseHint');

    const gameNameEl = document.getElementById('gameName');
    const gameMetaEl = document.getElementById('gameMeta');
    const gameValueEl = document.getElementById('gameValue');
    const gameTarget = document.getElementById('gameTarget');

    const btnKontra = document.getElementById('btnKontra');
    const kontraHint = document.getElementById('kontraHint');

    const premListEl = document.getElementById('premList');

    const sumLeft = document.getElementById('sumLeft');
    const sumRight = document.getElementById('sumRight');

    const btnCancel = document.getElementById('btnCancel');
    const btnSave = document.getElementById('btnSave');

    /* =========================================================
      Helpers
    ========================================================= */
    function esc(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    function kontraFactor(level){
      if(level === 1) return 2;
      if(level === 2) return 4;
      if(level === 3) return 8;
      return 1;
    }
    function kontraLabel(level){
      if(level === 1) return 'Kontra';
      if(level === 2) return 'Re';
      if(level === 3) return 'Sub';
      return 'AUS';
    }
    function stageNext(level){
      return (level + 1) % 4;
    }

    function isSoloGame(){
      return !!(selectedGame && SOLO_GAMES.has(selectedGame.code));
    }
    function isNegativeGame(){
      return !!(selectedGame && NEGATIVE_GAMES.has(selectedGame.code));
    }
    function isSelberRuferGame(){
      return !!(selectedGame && SELBER_RUFER_GAMES.has(selectedGame.code));
    }
    function allowsPartner(){
      if(!selectedGame) return false;
      if(selectedGame.code === 'SECHSERDREIER') return false;
      if(isNegativeGame()) return false;
      return isSelberRuferGame();
    }

    function playerNameById(id){
      const p = seatPlayers.find(x => x.playerId === id);
      return p ? p.displayName : String(id);
    }

    function preferredSeatOrderByTableType(t){
      if(t === 4) return ['TOP','LEFT','RIGHT','BOTTOM'];
      if(t === 5) return ['LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
      if(t === 6) return ['TOP','LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
      return ['TOP','LEFT','RIGHT','BOTTOM','LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
    }

    function seatOrderFromSession(){
      const seatsObj = (sess && sess.seats) ? sess.seats : {};
      const keys = Object.keys(seatsObj);
      const t = Number(sess && sess.tableType) || 4;
      const pref = preferredSeatOrderByTableType(t);

      keys.sort((a,b) => {
        const ia = pref.indexOf(a);
        const ib = pref.indexOf(b);
        const sa = (ia === -1) ? 999 : ia;
        const sb = (ib === -1) ? 999 : ib;
        if(sa !== sb) return sa - sb;
        return a.localeCompare(b);
      });

      return keys;
    }

    function getCcwOrder(){
      if(sess && Array.isArray(sess.ccwOrder) && sess.ccwOrder.length){
        return sess.ccwOrder.slice();
      }
      const t = Number(sess && sess.tableType) || 4;
      if(t === 5) return ['BOTTOM','RIGHT_BOTTOM','RIGHT_TOP','LEFT_TOP','LEFT_BOTTOM'];
      if(t === 6) return ['BOTTOM','RIGHT_BOTTOM','RIGHT_TOP','TOP','LEFT_TOP','LEFT_BOTTOM'];
      return ['BOTTOM','RIGHT','TOP','LEFT'];
    }

    function computeDealerSeat(nextGabeNr){
      const ccw = getCcwOrder();
      const idx = (nextGabeNr - 1) % ccw.length;
      return ccw[idx];
    }

    function computePausedSeats(nextGabeNr){
      const t = Number(sess && sess.tableType) || 4;
      const dealer = computeDealerSeat(nextGabeNr);
      const paused = new Set();

      if(t === 5){
        paused.add(dealer);
      } else if(t === 6){
        paused.add(dealer);
        const opposite = {
          TOP:'BOTTOM',
          BOTTOM:'TOP',
          LEFT_TOP:'RIGHT_BOTTOM',
          RIGHT_BOTTOM:'LEFT_TOP',
          RIGHT_TOP:'LEFT_BOTTOM',
          LEFT_BOTTOM:'RIGHT_TOP'
        };
        const opp = opposite[dealer];
        if(opp) paused.add(opp);
      }
      return paused;
    }

    function refreshActivePlayers(){
      pausedSeatSet = computePausedSeats(gabeNr);
      pausedPlayerIdSet = new Set();

      for(const sp of seatPlayers){
        if(pausedSeatSet.has(sp.seat)){
          pausedPlayerIdSet.add(sp.playerId);
        }
      }

      activeSeatPlayers = seatPlayers.filter(sp => !pausedSeatSet.has(sp.seat));
    }

    function ensureSelectionsValid(){
      if(primaryId != null && pausedPlayerIdSet.has(primaryId)) primaryId = null;
      if(secondaryId != null && pausedPlayerIdSet.has(secondaryId)) secondaryId = null;
      if(!allowsPartner()) secondaryId = null;
      if(primaryId != null && secondaryId === primaryId) secondaryId = null;
    }

    function buildTeamIds(){
      const team = [];
      if(primaryId != null) team.push(primaryId);
      if(allowsPartner() && secondaryId != null) team.push(secondaryId);
      return team;
    }

    function activePlayerIds(){
      return activeSeatPlayers.map(p => p.playerId);
    }

    function mergeDelta(a,b){
      const out = {};
      for(const k in a) out[k] = (Number(out[k]) || 0) + (Number(a[k]) || 0);
      for(const k in b) out[k] = (Number(out[k]) || 0) + (Number(b[k]) || 0);
      return out;
    }

    /* =========================================================
      IndexedDB
    ========================================================= */
    function openDb(){
      return new Promise((resolve,reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {};
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function idbGet(db, store, key){
      return new Promise((resolve,reject) => {
        const tx = db.transaction(store,'readonly');
        const st = tx.objectStore(store);
        const rq = st.get(key);
        rq.onsuccess = () => resolve(rq.result);
        rq.onerror = () => reject(rq.error);
      });
    }

    function idbGetPlayer(db, id){
      return new Promise((resolve,reject) => {
        const tx = db.transaction(STORE_PLAYERS,'readonly');
        const st = tx.objectStore(STORE_PLAYERS);
        const rq = st.get(Number(id));
        rq.onsuccess = () => resolve(rq.result);
        rq.onerror = () => reject(rq.error);
      });
    }

    /* =========================================================
      Init / Navigation
    ========================================================= */
    btnCancel.addEventListener('click', () => {
      if(history.length > 1) history.back();
      else window.location.href = 'index.html';
    });

    window.addEventListener('load', async () => {
      try{
        selectedGame = JSON.parse(sessionStorage.getItem('selectedGame') || 'null');
      } catch {
        selectedGame = null;
      }
      if(!selectedGame || !selectedGame.code){
        if(history.length > 1) history.back();
        else window.location.href = 'index.html';
        return;
      }

      // defaults
      gameSign = +1;
      sechserMode = 'WIN';
      gameKontraLevel = 0;
      kontraStage = 0;
      kontraPending = false;

      PREMIUMS.forEach(p => { premState[p.key] = 0; premKontra[p.key] = 0; });

      const db = await openDb();
      sess = await idbGet(db, STORE_CURR_SESSION, CURR_KEY);
      currState = await idbGet(db, STORE_CURR_STATE, CURR_KEY);

      if(!sess || !sess.tableType || !sess.seats){
        db.close();
        window.location.href = 'index.html';
        return;
      }

      // table class for player grid
      const t = Number(sess.tableType) || 4;
      root.classList.remove('table4','table5','table6');
      root.classList.add(t === 4 ? 'table4' : (t === 5 ? 'table5' : 'table6'));

      gabeNr = (currState && Number.isFinite(currState.lastGabeNr)) ? (Number(currState.lastGabeNr) + 1) : 1;
      gabeInfoEl.textContent = 'Gabe ' + gabeNr;

      const gameLabel = GAME_LABELS[selectedGame.code] || selectedGame.code;
      sub.textContent = 'Spiel: ' + gameLabel + ' (' + String(selectedGame.category || '') + ')';

      seatPlayers = [];
      const seatKeys = seatOrderFromSession();
      for(const seat of seatKeys){
        const pid = sess.seats[seat];
        if(pid == null) continue;

        const pl = await idbGetPlayer(db, pid).catch(() => null);
        let disp = String(pid);
        if(pl){
          const nach = String(pl.nachname || '').trim();
          const vor = String(pl.vorname || '').trim();
          disp = (nach + ' ' + vor).trim() || String(pid);
        }
        seatPlayers.push({ seat, playerId: Number(pid), displayName: disp });
      }
      db.close();

      refreshActivePlayers();
      ensureSelectionsValid();

      renderPlayers();
      renderGame();
      renderPremiums();
      updateKontraUi();
      recomputeAndRender();

      // interactions
      gameValueEl.addEventListener('click', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        if(selectedGame.code === 'SECHSERDREIER'){
          sechserMode = (sechserMode === 'WIN') ? 'LOSS' : 'WIN';
        } else {
          gameSign = (gameSign === 1) ? -1 : 1;
        }
        recomputeAndRender();
      });

      btnKontra.addEventListener('click', () => {
        kontraStage = stageNext(kontraStage);
        kontraPending = true;
        updateKontraUi();
      });

      gameTarget.addEventListener('click', () => {
        if(!kontraPending) return;
        gameKontraLevel = kontraStage;
        kontraPending = false;
        updateKontraUi();
        recomputeAndRender();
      });

      btnSave.addEventListener('click', onSave);
    });

    /* =========================================================
      Render: Players / Game / Premiums
    ========================================================= */
    function renderPlayers(){
      playersGrid.innerHTML = '';

      const t = Number(sess && sess.tableType) || 4;
      const activeCount = activeSeatPlayers.length;
      const pausedSeatsArr = Array.from(pausedSeatSet);

      // hint
      if(selectedGame.code === 'SECHSERDREIER'){
        playerReqHint.textContent = 'Wähle Spieler 1 (Alleinspieler)';
      } else if(allowsPartner()){
        playerReqHint.textContent = 'Wähle Spieler 1 · Partner optional';
      } else {
        playerReqHint.textContent = 'Wähle Spieler 1 (Alleinspieler)';
      }

      if(t === 4){
        pauseHint.textContent = 'Aktiv: 4';
      } else if(t === 5){
        pauseHint.textContent = 'Aktiv: ' + activeCount + ' · Pause: ' + pausedSeatsArr.join(',');
      } else {
        pauseHint.textContent = 'Aktiv: ' + activeCount + ' · Pause: ' + pausedSeatsArr.join(',');
      }

      // tiles
      for(const sp of seatPlayers){
        const isPaused = pausedSeatSet.has(sp.seat) || pausedPlayerIdSet.has(sp.playerId);

        const tile = document.createElement('div');
        tile.className = 'pTile' + (isPaused ? ' paused' : '');
        tile.dataset.pid = String(sp.playerId);
        tile.dataset.paused = isPaused ? '1' : '0';

        tile.innerHTML = `
          <div class="pName">${esc(sp.displayName)}</div>
          <div class="pSeat">${esc(isPaused ? (sp.seat + ' · PAUSE') : sp.seat)}</div>
        `;

        tile.addEventListener('click', () => {
          if(tile.dataset.paused === '1') return;
          const pid = Number(tile.dataset.pid);

          if(primaryId === pid){
            primaryId = null;
            secondaryId = null;
          } else if(secondaryId === pid){
            secondaryId = null;
          } else if(primaryId == null){
            primaryId = pid;
          } else if(allowsPartner() && secondaryId == null && pid !== primaryId){
            secondaryId = pid;
          } else {
            if(!allowsPartner()){
              primaryId = pid;
              secondaryId = null;
            } else {
              if(pid !== primaryId) secondaryId = pid;
            }
          }

          ensureSelectionsValid();
          updatePlayerSelectionUi();
          recomputeAndRender();
        });

        playersGrid.appendChild(tile);
      }

      updatePlayerSelectionUi();
    }

    function updatePlayerSelectionUi(){
      const tiles = [...playersGrid.querySelectorAll('.pTile')];
      for(const t of tiles){
        const pid = Number(t.dataset.pid);
        t.classList.remove('selectedPrimary','selectedSecondary');
        if(primaryId === pid) t.classList.add('selectedPrimary');
        if(secondaryId === pid) t.classList.add('selectedSecondary');
      }
    }

    function renderGame(){
      const label = GAME_LABELS[selectedGame.code] || selectedGame.code;
      gameNameEl.textContent = label;

      // meta line
      const activeN = activeSeatPlayers.length;
      if(selectedGame.code === 'SECHSERDREIER'){
        gameMetaEl.textContent = 'Team: 1 vs ' + (activeN - 1) + ' · Modus toggeln';
      } else if(allowsPartner()){
        gameMetaEl.textContent = 'Team: 2vs2 oder 1vs' + (activeN - 1);
      } else {
        gameMetaEl.textContent = 'Team: 1 vs ' + (activeN - 1);
      }
    }

    function renderPremiums(){
      premListEl.innerHTML = '';

      for(const prem of PREMIUMS){
        const row = document.createElement('div');
        row.className = 'premRow targetable';
        row.dataset.pkey = prem.key;

        const allowed = premiumAllowed(selectedGame.code, prem.key);
        if(!allowed) row.classList.add('disabled');

        row.innerHTML = `
          <div class="premLeft">
            <div class="premName">${esc(prem.label)}</div>
            <div class="premMeta">${allowed ? (isSoloGame() ? 'Solo×2 möglich' : 'aktiv') : 'inaktiv'}</div>
          </div>
          <div class="premVal" id="val_${prem.key}">0</div>
        `;

        row.addEventListener('click', () => {
          if(row.classList.contains('disabled')) return;

          if(kontraPending){
            premKontra[prem.key] = kontraStage;
            kontraPending = false;
            updateKontraUi();
            recomputeAndRender();
            return;
          }

          premState[prem.key] = (Number(premState[prem.key]) + 1) % 5;
          recomputeAndRender();
        });

        premListEl.appendChild(row);
      }
    }

    function updateKontraUi(){
      if(kontraPending) root.classList.add('kontraPending');
      else root.classList.remove('kontraPending');

      const stageName = kontraLabel(kontraStage);
      const appliedGame = kontraLabel(gameKontraLevel);

      btnKontra.textContent = 'Kontra (' + stageName + ') → Ziel wählen';
      kontraHint.textContent = kontraPending
        ? ('Kontra: Ziel wählen (' + stageName + ')')
        : ('Spiel-Kontra: ' + appliedGame);
    }

    /* =========================================================
      Berechnung (Teamlogic final)
    ========================================================= */
    function calcGameComponent(teamIds){
      // delta for ALL players (paused => 0)
      const delta = {};
      for(const sp of seatPlayers){
        delta[String(sp.playerId)] = 0;
      }

      const activeIds = activePlayerIds();
      const activeCount = activeIds.length;
      if(activeCount < 2) return delta;

      const kf = kontraFactor(gameKontraLevel);

      // Sechserdreier: special among active only
      if(selectedGame.code === 'SECHSERDREIER'){
        const solo = (teamIds && teamIds.length) ? teamIds[0] : null;
        if(solo == null) return delta;
        if(pausedPlayerIdSet.has(solo)) return delta;

        const opp = activeIds.filter(id => id !== solo);

        if(sechserMode === 'WIN'){
          delta[String(solo)] += 12 * kf;
          for(const id of opp) delta[String(id)] -= 4 * kf;
        } else {
          delta[String(solo)] -= 24 * kf;
          for(const id of opp) delta[String(id)] += 8 * kf;
        }
        return delta;
      }

      const base = Number(selectedGame.value) || 0;
      const v = base * kf;

      const primary = (teamIds && teamIds.length) ? teamIds[0] : null;
      const partner = (teamIds && teamIds.length === 2) ? teamIds[1] : null;

      if(primary == null || pausedPlayerIdSet.has(primary)) return delta;

      const teamSize = (allowsPartner() && partner != null && !pausedPlayerIdSet.has(partner) && partner !== primary) ? 2 : 1;

      if(teamSize === 2){
        const opp = activeIds.filter(id => id !== primary && id !== partner);

        delta[String(primary)] += gameSign * v;
        delta[String(partner)] += gameSign * v;
        for(const id of opp){
          delta[String(id)] -= gameSign * v;
        }
      } else {
        const opp = activeIds.filter(id => id !== primary);
        delta[String(primary)] += gameSign * v * opp.length;
        for(const id of opp){
          delta[String(id)] -= gameSign * v;
        }
      }

      return delta;
    }

    function premEffectiveValue(prem){
      const st = Number(premState[prem.key]) || 0;
      if(st === 0) return 0;

      const sign = (st === 2 || st === 4) ? -1 : 1;
      const announced = (st === 3 || st === 4) ? 2 : 1;
      const soloFactor = isSoloGame() ? 2 : 1;
      const kf = kontraFactor(Number(premKontra[prem.key]) || 0);

      return sign * prem.base * soloFactor * announced * kf;
    }

    function calcPremiumsComponent(teamIds){
      // delta for ALL players (paused => 0)
      const delta = {};
      for(const sp of seatPlayers){
        delta[String(sp.playerId)] = 0;
      }

      const activeIds = activePlayerIds();
      if(activeIds.length < 2) return delta;

      const primary = (teamIds && teamIds.length) ? teamIds[0] : null;
      const partner = (teamIds && teamIds.length === 2) ? teamIds[1] : null;

      if(primary == null || pausedPlayerIdSet.has(primary)) return delta;

      const teamSize = (allowsPartner() && partner != null && !pausedPlayerIdSet.has(partner) && partner !== primary) ? 2 : 1;
      const teamSet = new Set(teamSize === 2 ? [primary, partner] : [primary]);
      const opp = activeIds.filter(id => !teamSet.has(id));

      for(const prem of PREMIUMS){
        if(!premiumAllowed(selectedGame.code, prem.key)) continue;

        const ev = premEffectiveValue(prem);
        if(ev === 0) continue;

        if(teamSize === 2){
          delta[String(primary)] += ev;
          delta[String(partner)] += ev;
          for(const id of opp) delta[String(id)] -= ev;
        } else {
          delta[String(primary)] += ev * opp.length;
          for(const id of opp) delta[String(id)] -= ev;
        }
      }

      return delta;
    }

    function recomputeAndRender(){
      refreshActivePlayers();
      ensureSelectionsValid();
      updatePlayerSelectionUi();
      renderGame();
      updateKontraUi();

      // game value display
      if(selectedGame.code === 'SECHSERDREIER'){
        gameValueEl.textContent = (sechserMode === 'WIN') ? 'Gewinn' : 'Verlust';
        gameValueEl.classList.remove('numRed','numBlack');
        gameValueEl.classList.add(sechserMode === 'LOSS' ? 'numRed' : 'numBlack');
      } else {
        const v = Number(selectedGame.value) || 0;
        const disp = (gameSign === 1) ? v : -v;
        gameValueEl.textContent = String(disp);
        gameValueEl.classList.remove('numRed','numBlack');
        gameValueEl.classList.add(disp < 0 ? 'numRed' : 'numBlack');
      }

      // save enable
      let canSave = (primaryId != null && !pausedPlayerIdSet.has(primaryId));
      if(secondaryId != null){
        if(pausedPlayerIdSet.has(secondaryId)) canSave = false;
        if(primaryId === secondaryId) canSave = false;
        if(!allowsPartner()) canSave = false;
      }
      btnSave.disabled = !canSave;

      // compute deltas
      const team = buildTeamIds();
      const dGame = calcGameComponent(team);
      const dPrem = calcPremiumsComponent(team);
      const dAll = mergeDelta(dGame, dPrem);

      // render premiums values
      for(const prem of PREMIUMS){
        const el = document.getElementById('val_' + prem.key);
        if(!el) continue;

        if(!premiumAllowed(selectedGame.code, prem.key)){
          el.textContent = '0';
          el.classList.remove('numRed','numBlack');
          el.classList.add('numBlack');
          continue;
        }
        const ev = premEffectiveValue(prem);
        el.textContent = String(ev);
        el.classList.remove('numRed','numBlack');
        el.classList.add(ev < 0 ? 'numRed' : 'numBlack');
      }

      // mini summary (no per-player list)
      let sum = 0;
      for(const sp of seatPlayers){
        sum += Number(dAll[String(sp.playerId)]) || 0;
      }

      if(primaryId != null){
        const pv = Number(dAll[String(primaryId)]) || 0;
        const mode = (allowsPartner() && secondaryId != null) ? '2vs2' : ('1vs' + (activeSeatPlayers.length - 1));
        sumLeft.textContent = 'Spieler 1: ' + playerNameById(primaryId) + ' (' + mode + ')';
        sumRight.textContent = 'Δ ' + String(pv) + ' · Σ ' + String(sum) + (sum === 0 ? ' OK' : ' ⚠');
      } else {
        sumLeft.textContent = 'Wähle Spieler 1';
        sumRight.textContent = 'Σ ' + String(sum) + (sum === 0 ? ' OK' : ' ⚠');
      }

      sumRight.classList.remove('numRed','numBlack');
      if(sum !== 0) sumRight.classList.add('numRed'); else sumRight.classList.add('numBlack');
    }

    /* =========================================================
      Save (IndexedDB)
    ========================================================= */
    async function onSave(){
      if(btnSave.disabled) return;

      const team = buildTeamIds();

      const dGame = calcGameComponent(team);
      const dPrem = calcPremiumsComponent(team);
      const dAll = mergeDelta(dGame, dPrem);

      const now = new Date().toISOString();
      const nextGabeNr = gabeNr;

      const gabe = {
        gabeNr: nextGabeNr,
        createdUtc: now,
        tableType: Number(sess.tableType),
        active: {
          activeSeatCount: activeSeatPlayers.length,
          pausedSeats: Array.from(pausedSeatSet),
          pausedPlayerIds: Array.from(pausedPlayerIdSet)
        },
        game: {
          code: selectedGame.code,
          value: Number(selectedGame.value) || 0,
          category: String(selectedGame.category || ''),
          sign: (selectedGame.code === 'SECHSERDREIER') ? null : gameSign,
          sechserMode: (selectedGame.code === 'SECHSERDREIER') ? sechserMode : null,
          kontraLevel: gameKontraLevel,
          teamMode: (allowsPartner() && secondaryId != null) ? '2v2' : ('1v' + (activeSeatPlayers.length - 1))
        },
        players: {
          primaryId: primaryId,
          secondaryId: (allowsPartner() ? (secondaryId || null) : null)
        },
        premiums: PREMIUMS.map(p => ({
          key: p.key,
          base: p.base,
          state: Number(premState[p.key]) || 0,
          kontraLevel: Number(premKontra[p.key]) || 0,
          allowed: premiumAllowed(selectedGame.code, p.key)
        })),
        deltaByPlayerId: dAll
      };

      const totals = (currState && currState.totalByPlayerId) ? {...currState.totalByPlayerId} : {};
      const lastD = (currState && currState.lastDeltaByPlayerId) ? {...currState.lastDeltaByPlayerId} : {};

      for(const sp of seatPlayers){
        const pid = String(sp.playerId);
        const dv = Number(dAll[pid]) || 0;
        totals[pid] = (Number(totals[pid]) || 0) + dv;
        lastD[pid] = dv;
      }

      const newState = {
        key: CURR_KEY,
        totalByPlayerId: totals,
        lastDeltaByPlayerId: lastD,
        lastGabeNr: nextGabeNr,
        updatedUtc: now
      };

      const db = await openDb();
      await new Promise((resolve,reject) => {
        const tx = db.transaction([STORE_GABEN, STORE_CURR_STATE], 'readwrite');
        tx.objectStore(STORE_GABEN).put(gabe);
        tx.objectStore(STORE_CURR_STATE).put(newState);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
      db.close();

      const t = Number(sess.tableType);
      const target = (t === 4) ? '4er-Screen.html' : (t === 5) ? '5er-Screen.html' : '6er-Screen.html';
      window.location.href = target;
    }
  </script>
