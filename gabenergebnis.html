<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ETS – Gabenergebnis</title>

  <!--
    ETS – Elektronischer Tarock Schreibblock
    SCREEN: Gabenergebnis (STC)

    NEU (Farbenspiele):
      - Für FARBENDREIER und FARBENSOLO gibt es NUR 2 Prämien: VIER_KOENIGE und VALAT.
      - Alle anderen Prämien werden ausgeblendet (nicht gerendert).
  -->

  <style>
    :root{
      --bg:#cfe9ff;
      --panel:#cfe9ff;
      --barBg:#3b6fa8;
      --line:#000;
      --lineW:3px;
      --font: Arial, sans-serif;

      --black:#000;
      --red:#c00000;

      --btnBorder:rgba(0,0,0,.70);
      --btnRadius:10px;
      --padX:12px;

      --cardBg: rgba(255,255,255,.70);
      --chipBg: rgba(255,255,255,.18);
      --chipBorder: rgba(0,0,0,.25);

      --selPrimaryBg: rgba(59,111,168,.20);
      --selPrimaryBorder: rgba(59,111,168,.95);
      --selSecondaryBg: rgba(255,230,90,.60);
      --selSecondaryBorder: rgba(0,0,0,.30);

      --pausedOpacity: .35;
      --lockedOpacity: .70;

      --kontraOutline: rgba(59,111,168,.90);
    }

    *{box-sizing:border-box;}
    html,body{height:100%; overflow:hidden;}
    body{
      margin:0;
      background:var(--bg);
      font-family:var(--font);
      display:flex;
      justify-content:center;
      color:var(--black);
    }

    .phone{
      width:min(480px,100%);
      height:100dvh;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* Topbar */
    .topbar{
      height: calc(56px + env(safe-area-inset-top));
      padding: calc(8px + env(safe-area-inset-top)) var(--padX) 8px var(--padX);
      background:var(--barBg);
      border-bottom:var(--lineW) solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
    }
    .titleWrap{min-width:0;display:flex;flex-direction:column;gap:2px;}
    .title{
      font-size:16px;
      font-weight:900;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.1;
    }
    .subtitle{
      font-size:11px;
      font-weight:700;
      color:rgba(255,255,255,.85);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pill{
      flex:0 0 auto;
      height:30px;
      padding:0 10px;
      border-radius:10px;
      background:var(--chipBg);
      border:1px solid var(--chipBorder);
      display:flex;
      align-items:center;
      gap:8px;
      color:#fff;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }

    /* Main grid: NO SCROLL, 1 screen */
    .main{
      flex:1 1 auto;
      min-height:0;
      padding:10px var(--padX);
      display:grid;
      grid-template-rows: auto auto 1fr auto;
      gap:8px;
      overflow:hidden;
    }

    /* Players block */
    .playersBlock{
      background:var(--cardBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      padding:8px;
      overflow:hidden;
    }
    .playersGrid{
      display:grid;
      gap:6px;
      align-content:start;
      grid-template-columns: repeat(3, 1fr);
    }
    .table4 .playersGrid{ grid-template-columns: repeat(2, 1fr); }
    .table5 .playersGrid{ grid-template-columns: repeat(3, 1fr); }
    .table6 .playersGrid{ grid-template-columns: repeat(3, 1fr); }

    .pTile{
      border:1px solid rgba(0,0,0,.28);
      border-radius:10px;
      background:#fff;
      padding:8px 8px;
      min-width:0;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .pTile:active{transform:translateY(1px);}
    .pName{
      font-weight:900;
      font-size:13px;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pSeat{
      font-size:10px;
      font-weight:900;
      color:rgba(0,0,0,.60);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pTile.paused{
      opacity:var(--pausedOpacity);
      cursor:default;
      background:rgba(255,255,255,.55);
    }
    .pTile.lockedPrimary{
      opacity:var(--lockedOpacity);
      cursor:default;
    }
    .pTile.selectedPrimary{
      background:var(--selPrimaryBg);
      border-color:var(--selPrimaryBorder);
    }
    .pTile.selectedSecondary{
      background:var(--selSecondaryBg);
      border-color:var(--selSecondaryBorder);
    }

    .miniInfoRow{
      margin-top:6px;
      display:flex;
      gap:8px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }
    .miniChip{
      border:1px solid rgba(0,0,0,.20);
      background:rgba(255,255,255,.55);
      border-radius:999px;
      padding:4px 8px;
      font-size:11px;
      font-weight:900;
      color:rgba(0,0,0,.78);
      white-space:nowrap;
    }

    /* Game row */
    .gameRow{
      background:var(--cardBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      padding:8px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .gameLine{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      border:1px solid rgba(0,0,0,.30);
      background:#fff;
      border-radius:10px;
      padding:8px 10px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      cursor:pointer;
    }
    .gameLine:active{transform:translateY(1px);}
    .gameLeft{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .gameName{
      font-weight:900;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.05;
    }
    .gameMeta{
      font-size:10px;
      font-weight:900;
      color:rgba(0,0,0,.60);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .gameValue{
      font-weight:900;
      font-size:18px;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.22);
      background:rgba(59,111,168,.12);
      white-space:nowrap;
      min-width:70px;
      text-align:right;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:6px;
    }

    .numRed{color:var(--red)!important;}
    .numBlack{color:var(--black)!important;}

    .kontraRow{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .btnKontra{
      flex:1 1 auto;
      height:36px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      background:rgba(59,111,168,.14);
      color:rgba(0,0,0,.88);
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .btnKontra:active{transform:translateY(1px);}
    .btnKontra:disabled{opacity:.45;cursor:default;}
    .kontraBadge{
      font-size:11px;
      font-weight:900;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.20);
      background:rgba(255,255,255,.55);
      white-space:nowrap;
    }

    .kontraList{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-start;
    }
    .kchip{
      border:1px solid rgba(0,0,0,.20);
      background:rgba(255,255,255,.55);
      border-radius:999px;
      padding:3px 7px;
      font-size:11px;
      font-weight:900;
      color:rgba(0,0,0,.78);
      white-space:nowrap;
    }

    /* Premiums block (2 columns) */
    .premBlock{
      background:var(--cardBg);
      border:1px solid var(--btnBorder);
      border-radius:var(--btnRadius);
      padding:8px;
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .premGrid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
      overflow:hidden;
    }

    .premCol{
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:6px;
      overflow:hidden;
    }

    .premRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:7px 9px;
      background:#fff;
      border:1px solid rgba(0,0,0,.22);
      border-radius:10px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      position:relative;
    }
    .premRow:active{transform:translateY(1px);}
    .premRow.disabled{
      opacity:.35;
      cursor:default;
      background:rgba(255,255,255,.70);
    }

    .premLeft{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:1px;
    }
    .premName{
      font-weight:900;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.05;
      cursor:pointer;
    }
    .premVal{
      font-weight:900;
      font-size:14px;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.18);
      background:rgba(0,0,0,.04);
      white-space:nowrap;
      min-width:70px;
      text-align:right;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:6px;
    }
    .pKBadge{
      font-size:10px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.18);
      background:rgba(59,111,168,.12);
      color:rgba(0,0,0,.78);
      white-space:nowrap;
    }

    .kontraMode .kontraTarget{
      outline:2px dashed var(--kontraOutline);
      outline-offset:2px;
    }
    .kontraMode .gameLine.kontraTarget{
      outline:2px dashed var(--kontraOutline);
      outline-offset:2px;
    }

    /* Summary row: same height as premRow */
    .sumRow{
      cursor:default;
    }
    .sumRow:active{transform:none;}
    .sumText{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-weight:900;
      font-size:13px;
      min-width:0;
    }
    .sumLeftTxt{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .sumRightTxt{
      white-space:nowrap;
    }

    .bottombar{
      height: calc(62px + env(safe-area-inset-bottom));
      background:var(--barBg);
      border-top:var(--lineW) solid var(--line);
      padding: 8px var(--padX) calc(8px + env(safe-area-inset-bottom)) var(--padX);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex:0 0 auto;
    }
    .actionBtn{
      flex:1 1 auto;
      height:46px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      background:rgba(255,255,255,.20);
      color:#fff;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .actionBtn.primary{ background:rgba(255,255,255,.26); }
    .actionBtn:disabled{opacity:.45;cursor:default;}
    .actionBtn:active:not(:disabled){transform:translateY(1px);}

    @media (max-height: 680px){
      .pTile{ padding:7px 7px; }
      .premRow{ padding:6px 8px; }
      .gameLine{ padding:7px 9px; }
      .gameValue{ font-size:17px; }
      .premVal{ padding:5px 8px; min-width:64px; }
      .sumText{ font-size:13px; }
    }
  </style>
</head>

<body>
  <div class="phone" id="root">
    <div class="topbar">
      <div class="titleWrap">
        <div class="title">Gabe erfassen</div>
        <div id="sub" class="subtitle">—</div>
      </div>
      <div class="pill"><span id="gabeInfo">Gabe …</span></div>
    </div>

    <div class="main" id="main">
      <div class="playersBlock">
        <div class="playersGrid" id="playersGrid"></div>
        <div class="miniInfoRow">
          <div class="miniChip" id="playerReqHint">—</div>
          <div class="miniChip" id="pauseHint">—</div>
        </div>
      </div>

      <div class="gameRow">
        <div class="gameLine" id="gameTarget">
          <div class="gameLeft">
            <div class="gameName" id="gameName">—</div>
            <div class="gameMeta" id="gameMeta">—</div>
          </div>

          <div class="gameValue" id="gameValue">
            <span class="pKBadge" id="kbadge_game" style="display:none;"></span>
            <span id="gameValueText">0</span>
          </div>
        </div>

        <div class="kontraRow">
          <button class="btnKontra" id="btnKontra" type="button">Kontra-Modus: AUS</button>
          <div class="kontraBadge" id="kontraHint">Spiel-Kontra: AUS</div>
        </div>

        <div class="kontraList" id="kontraList"></div>
      </div>

      <div class="premBlock" id="premBlock">
        <div class="premGrid">
          <div class="premCol" id="premLeftCol"></div>
          <div class="premCol" id="premRightCol"></div>
        </div>
      </div>

      <div class="premRow sumRow" id="sumRow">
        <div class="sumText">
          <div class="sumLeftTxt" id="sumLeft">—</div>
          <div class="sumRightTxt" id="sumRight">—</div>
        </div>
      </div>
    </div>

    <div class="bottombar">
      <button id="btnCancel" class="actionBtn" type="button">Zurück</button>
      <button id="btnSave" class="actionBtn primary" type="button" disabled>Übernehmen</button>
    </div>
  </div>

  <script>
    const DB_NAME = 'ets_db';
    const DB_VERSION = 2;
    const STORE_PLAYERS = 'players';
    const STORE_CURR_SESSION = 'current_session';
    const STORE_CURR_STATE = 'current_state';
    const STORE_GABEN = 'gaben';
    const CURR_KEY = 'current';

    const GAME_LABELS = {
      KOENIG_RUFER: '(König)Rufer (V)',
      SOLO_RUFER: 'Solorufer',
      PAGATRUFER: 'Pagatrufer',
      SECHSERDREIER: 'Sechserdreier (V)',
      UHU_RUFER: 'Uhurufer',
      DREIER: 'Dreier',
      KAKADU_RUFER: 'Kakadurufer',
      QUAPIL_RUFER: 'Quapilrufer',
      SOLO_DREIER: 'Solodreier',
      TRISCHAKEN: 'Trischaken (V)',
      PICCOLO: 'Piccolo',
      ZWICCOLO: 'Zwiccolo',
      BETTLER: 'Bettler',
      PICCOLO_OUVERT: 'Piccolo ouvert',
      ZWICCOLO_OUVERT: 'Zwiccolo ouvert',
      BETTLER_OUVERT: 'Bettler ouvert',
      FARBENDREIER: 'Farbendreier',
      FARBENSOLO: 'Farbensolo'
    };

    const SELBER_RUFER_GAMES = new Set(['KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER']);
    const SOLO_GAMES = new Set(['SOLO_RUFER','SOLO_DREIER','FARBENSOLO']);
    const NEGATIVE_GAMES = new Set(['TRISCHAKEN','PICCOLO','ZWICCOLO','BETTLER','PICCOLO_OUVERT','ZWICCOLO_OUVERT','BETTLER_OUVERT']);
    const V_GAMES = new Set(['KOENIG_RUFER','SECHSERDREIER','TRISCHAKEN']);

    // Farbenspiele (neu)
    const COLOR_GAMES = new Set(['FARBENDREIER','FARBENSOLO']);
    const COLOR_PREM_ALLOWED = new Set(['VIER_KOENIGE','VALAT']);

    const SPLIT_RUFER = new Map([
      ['PAGATRUFER',  'PAGAT_ULTIMO'],
      ['UHU_RUFER',   'UHU'],
      ['KAKADU_RUFER','KAKADU'],
      ['QUAPIL_RUFER','QUAPIL']
    ]);

    const PREMIUMS = [
      { key:'PAGAT_ULTIMO', displayLabel:'Pagat', base:1, column:'LEFT' },
      { key:'UHU',          displayLabel:'Uhu',   base:2, column:'LEFT' },
      { key:'KAKADU',       displayLabel:'Kakadu',base:3, column:'LEFT' },
      { key:'QUAPIL',       displayLabel:'Quapil',base:4, column:'LEFT' },
      { key:'KOENIG_ULT',   displayLabel:'König ultimo', base:1,  column:'RIGHT' },
      { key:'TRULL',        displayLabel:'Trull',        base:1,  column:'RIGHT' },
      { key:'VIER_KOENIGE', displayLabel:'4 Könige',     base:1,  column:'RIGHT' },
      { key:'VALAT',        displayLabel:'Valat',        base:10, column:'RIGHT' }
    ];

    function isColorGame(){ return !!(selectedGame && COLOR_GAMES.has(selectedGame.code)); }
    function isNegativeGame(){ return !!(selectedGame && NEGATIVE_GAMES.has(selectedGame.code)); }
    function isSoloGame(){ return !!(selectedGame && SOLO_GAMES.has(selectedGame.code)); }
    function isVGame(){ return !!(selectedGame && V_GAMES.has(selectedGame.code)); }
    function isSelberRuferGame(){ return !!(selectedGame && SELBER_RUFER_GAMES.has(selectedGame.code)); }
    function isSplitRuferGame(){ return !!(selectedGame && SPLIT_RUFER.has(selectedGame.code)); }

    function allowsPartner(){
      if(!selectedGame) return false;
      if(isNegativeGame()) return false;
      if(selectedGame.code === 'SECHSERDREIER') return false;
      return isSelberRuferGame();
    }

    function premiumAllowed(gameCode, premKey){
      // Farbenspiele: nur 4 Könige + Valat
      if(COLOR_GAMES.has(gameCode)) return COLOR_PREM_ALLOWED.has(premKey);

      // Sechserdreier: alle Prämien erlaubt
      if(gameCode === 'SECHSERDREIER') return true;

      // sonst Ultimo konservativ
      const isUltimo = (premKey === 'PAGAT_ULTIMO' || premKey === 'KOENIG_ULT');
      if(!isUltimo) return true;
      return ['KOENIG_RUFER','PAGATRUFER','UHU_RUFER','KAKADU_RUFER','QUAPIL_RUFER','SOLO_RUFER'].includes(gameCode);
    }

    function getActivePremiums(){
      // Negativspiele: keine Prämien
      if(!premiumsEnabled) return [];
      // Farbenspiele: nur 2 Prämien
      if(isColorGame()){
        return PREMIUMS.filter(p => COLOR_PREM_ALLOWED.has(p.key));
      }
      // sonst normaler Satz
      return PREMIUMS.slice();
    }

    function kontraFactor(level){
      if(level === 1) return 2;
      if(level === 2) return 4;
      if(level === 3) return 8;
      return 1;
    }
    function kontraLabel(level){
      if(level === 1) return 'Kontra';
      if(level === 2) return 'Re';
      if(level === 3) return 'Sub';
      return 'AUS';
    }
    function cycleKontraLevel(curr){ return (Number(curr) + 1) % 4; }

    function fmtPlus(n){
      const v = Number(n) || 0;
      if(v > 0) return '+' + v;
      return String(v);
    }

    function esc(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    /* ===================== State ===================== */
    let selectedGame = null;
    let sess = null;
    let currState = null;

    let seatPlayers = [];
    let gabeNr = 1;

    let activeSeatPlayers = [];
    let pausedSeatSet = new Set();
    let pausedPlayerIdSet = new Set();

    let primaryId = null;
    let secondaryId = null;

    let gameSign = +1;
    let sechserMode = 'WIN';

    let gameKontraLevel = 0;
    let kontraMode = false;

    let premMag = {};
    let premSign = {};
    let premKontra = {};

    let premiumsEnabled = true;

    let vorhandSeat = null;
    let vorhandPlayerId = null;

    let gameCatalogValue = 0;
    let gameEffectiveBase = 0;
    let splitPremKey = null;

    /* ===================== DOM ===================== */
    const root = document.getElementById('root');
    const sub = document.getElementById('sub');
    const gabeInfoEl = document.getElementById('gabeInfo');

    const playersGrid = document.getElementById('playersGrid');
    const playerReqHint = document.getElementById('playerReqHint');
    const pauseHint = document.getElementById('pauseHint');

    const gameNameEl = document.getElementById('gameName');
    const gameMetaEl = document.getElementById('gameMeta');

    const gameTarget = document.getElementById('gameTarget');
    const gameValueEl = document.getElementById('gameValue');
    const gameValueText = document.getElementById('gameValueText');
    const gameKBadge = document.getElementById('kbadge_game');

    const btnKontra = document.getElementById('btnKontra');
    const kontraHint = document.getElementById('kontraHint');
    const kontraList = document.getElementById('kontraList');

    const premBlock = document.getElementById('premBlock');
    const premLeftCol = document.getElementById('premLeftCol');
    const premRightCol = document.getElementById('premRightCol');

    const sumLeft = document.getElementById('sumLeft');
    const sumRight = document.getElementById('sumRight');

    const btnCancel = document.getElementById('btnCancel');
    const btnSave = document.getElementById('btnSave');

    /* ===================== Seat helpers ===================== */
    function preferredSeatOrderByTableType(t){
      if(t === 4) return ['TOP','LEFT','RIGHT','BOTTOM'];
      if(t === 5) return ['LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
      if(t === 6) return ['TOP','LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
      return ['TOP','LEFT','RIGHT','BOTTOM','LEFT_TOP','RIGHT_TOP','LEFT_BOTTOM','RIGHT_BOTTOM','BOTTOM'];
    }

    function seatOrderFromSession(){
      const seatsObj = (sess && sess.seats) ? sess.seats : {};
      const keys = Object.keys(seatsObj);
      const t = Number(sess && sess.tableType) || 4;
      const pref = preferredSeatOrderByTableType(t);
      keys.sort((a,b) => {
        const ia = pref.indexOf(a);
        const ib = pref.indexOf(b);
        const sa = (ia === -1) ? 999 : ia;
        const sb = (ib === -1) ? 999 : ib;
        if(sa !== sb) return sa - sb;
        return a.localeCompare(b);
      });
      return keys;
    }

    function getCcwOrder(){
      if(sess && Array.isArray(sess.ccwOrder) && sess.ccwOrder.length) return sess.ccwOrder.slice();
      const t = Number(sess && sess.tableType) || 4;
      if(t === 5) return ['BOTTOM','RIGHT_BOTTOM','RIGHT_TOP','LEFT_TOP','LEFT_BOTTOM'];
      if(t === 6) return ['BOTTOM','RIGHT_BOTTOM','RIGHT_TOP','TOP','LEFT_TOP','LEFT_BOTTOM'];
      return ['BOTTOM','RIGHT','TOP','LEFT'];
    }

    function computeDealerSeat(nextGabeNr){
      const ccw = getCcwOrder();
      return ccw[(nextGabeNr - 1) % ccw.length];
    }

    function nextCcwSeat(seat){
      const ccw = getCcwOrder();
      const i = ccw.indexOf(seat);
      if(i < 0) return ccw[0];
      return ccw[(i + 1) % ccw.length];
    }

    function computeVorhandSeat(nextGabeNr){
      const dealer = computeDealerSeat(nextGabeNr);
      return nextCcwSeat(dealer);
    }

    function computePausedSeats(nextGabeNr){
      const t = Number(sess && sess.tableType) || 4;
      const dealer = computeDealerSeat(nextGabeNr);
      const paused = new Set();
      if(t === 5){
        paused.add(dealer);
      } else if(t === 6){
        paused.add(dealer);
        const opposite = {
          TOP:'BOTTOM', BOTTOM:'TOP',
          LEFT_TOP:'RIGHT_BOTTOM', RIGHT_BOTTOM:'LEFT_TOP',
          RIGHT_TOP:'LEFT_BOTTOM', LEFT_BOTTOM:'RIGHT_TOP'
        };
        const opp = opposite[dealer];
        if(opp) paused.add(opp);
      }
      return paused;
    }

    function refreshActivePlayers(){
      pausedSeatSet = computePausedSeats(gabeNr);
      pausedPlayerIdSet = new Set();
      for(const sp of seatPlayers){
        if(pausedSeatSet.has(sp.seat)) pausedPlayerIdSet.add(sp.playerId);
      }
      activeSeatPlayers = seatPlayers.filter(sp => !pausedSeatSet.has(sp.seat));
    }

    function activePlayerIds(){ return activeSeatPlayers.map(p => p.playerId); }

    function enforceVorhandIfVGame(){
      if(!isVGame()){
        vorhandSeat = null;
        vorhandPlayerId = null;
        return;
      }
      vorhandSeat = computeVorhandSeat(gabeNr);
      vorhandPlayerId = (sess && sess.seats) ? sess.seats[vorhandSeat] : null;
      if(vorhandPlayerId != null) primaryId = Number(vorhandPlayerId);
      if(primaryId != null && secondaryId === primaryId) secondaryId = null;
    }

    function ensureSelectionsValid(){
      if(primaryId != null && pausedPlayerIdSet.has(primaryId)) primaryId = null;
      if(secondaryId != null && pausedPlayerIdSet.has(secondaryId)) secondaryId = null;

      if(isVGame()){
        enforceVorhandIfVGame();
      } else {
        vorhandSeat = null;
        vorhandPlayerId = null;
      }

      if(!allowsPartner()) secondaryId = null;
      if(primaryId != null && secondaryId === primaryId) secondaryId = null;
    }

    function buildTeamIds(){
      const team = [];
      if(primaryId != null) team.push(primaryId);
      if(allowsPartner() && secondaryId != null) team.push(secondaryId);
      return team;
    }

    function mergeDelta(a,b){
      const out = {};
      for(const k in a) out[k] = (Number(out[k]) || 0) + (Number(a[k]) || 0);
      for(const k in b) out[k] = (Number(out[k]) || 0) + (Number(b[k]) || 0);
      return out;
    }

    /* ===================== Premium helpers ===================== */
    function getPremAbsBase(premKey){
      const p = PREMIUMS.find(x => x.key === premKey);
      return p ? p.base : 0;
    }

    function isPremiumAnnounced(premKey){
      return (Number(premMag[premKey]) || 0) === 2;
    }

    function premValueSignedRaw(premKey){
      const mag = Number(premMag[premKey]) || 0;
      if(mag === 0) return 0;
      const base = getPremAbsBase(premKey);
      const absVal = (mag === 1) ? base : (2 * base);
      const s = (premSign[premKey] === -1) ? -1 : 1;
      return s * absVal;
    }

    function premValueSignedDisplay(premKey){
      const raw = premValueSignedRaw(premKey);
      if(raw === 0) return 0;
      const soloFactor = isSoloGame() ? 2 : 1;
      const kf = kontraFactor(Number(premKontra[premKey]) || 0);
      return raw * soloFactor * kf;
    }

    function premEffectiveValue(premKey){
      return premValueSignedDisplay(premKey);
    }

    function cyclePremByName(premKey){
      const mag = Number(premMag[premKey]) || 0;
      const next = (mag + 1) % 3;
      premMag[premKey] = next;
      premSign[premKey] = +1;
      if(next !== 2){
        premKontra[premKey] = 0;
      }
    }

    function togglePremSignByNumber(premKey){
      const mag = Number(premMag[premKey]) || 0;
      if(mag === 0) return;
      premSign[premKey] = (premSign[premKey] === -1) ? +1 : -1;
    }

    /* ===================== Split-Rufer ===================== */
    function computeEffectiveGameBase(){
      gameCatalogValue = Number(selectedGame.value) || 0;
      splitPremKey = null;
      if(isSplitRuferGame()){
        gameEffectiveBase = 1;
        splitPremKey = SPLIT_RUFER.get(selectedGame.code) || null;
      } else {
        gameEffectiveBase = Number(selectedGame.value) || 0;
      }
    }

    function applyInitialSplitPremiumIfNeeded(){
      if(!isSplitRuferGame()) return;
      if(!splitPremKey) return;
      // Bei Farbenspielen irrelevant, da kein Split-Rufer
      premMag[splitPremKey] = 2;
      premSign[splitPremKey] = +1;
    }

    /* ===================== Game display ===================== */
    function gameRawValueForDisplay(){
      if(selectedGame.code === 'SECHSERDREIER'){
        return (sechserMode === 'WIN') ? 4 : -8;
      } else {
        const base = Number(gameEffectiveBase) || 0;
        return (gameSign === 1) ? base : -base;
      }
    }

    function gameValueForDisplay(){
      const raw = gameRawValueForDisplay();
      const kf = kontraFactor(gameKontraLevel);
      return raw * kf;
    }

    /* ===================== Kontra mode ===================== */
    function setKontraMode(on){
      kontraMode = !!on;
      if(kontraMode) root.classList.add('kontraMode');
      else root.classList.remove('kontraMode');
      updateKontraUi();
      updateKontraTargetability();
      renderKontraList();
    }

    function updateKontraUi(){
      btnKontra.textContent = kontraMode ? 'Kontra-Modus: AN' : 'Kontra-Modus: AUS';
      kontraHint.textContent = 'Spiel-Kontra: ' + kontraLabel(gameKontraLevel);
    }

    function updateKontraTargetability(){
      gameTarget.classList.remove('kontraTarget');
      if(kontraMode) gameTarget.classList.add('kontraTarget');
      if(!premiumsEnabled) return;

      const activePrems = getActivePremiums();
      for(const prem of activePrems){
        const row = document.getElementById('row_' + prem.key);
        if(row) row.classList.remove('kontraTarget');
        if(!premiumAllowed(selectedGame.code, prem.key)) continue;
        if(kontraMode && isPremiumAnnounced(prem.key)){
          if(row) row.classList.add('kontraTarget');
        }
      }
    }

    function renderKontraList(){
      kontraList.innerHTML = '';
      const items = [];
      if(gameKontraLevel > 0){
        items.push({label: 'Spiel=' + kontraLabel(gameKontraLevel)});
      }
      if(premiumsEnabled){
        const activePrems = getActivePremiums();
        for(const prem of activePrems){
          const lvl = Number(premKontra[prem.key]) || 0;
          if(lvl > 0){
            items.push({label: prem.displayLabel + '=' + kontraLabel(lvl)});
          }
        }
      }
      for(const it of items){
        const d = document.createElement('div');
        d.className = 'kchip';
        d.textContent = it.label;
        kontraList.appendChild(d);
      }
    }

    /* ===================== IndexedDB ===================== */
    function openDb(){
      return new Promise((resolve,reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {};
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function idbGet(db, store, key){
      return new Promise((resolve,reject) => {
        const tx = db.transaction(store,'readonly');
        const st = tx.objectStore(store);
        const rq = st.get(key);
        rq.onsuccess = () => resolve(rq.result);
        rq.onerror = () => reject(rq.error);
      });
    }

    function idbGetPlayer(db, id){
      return new Promise((resolve,reject) => {
        const tx = db.transaction(STORE_PLAYERS,'readonly');
        const st = tx.objectStore(STORE_PLAYERS);
        const rq = st.get(Number(id));
        rq.onsuccess = () => resolve(rq.result);
        rq.onerror = () => reject(rq.error);
      });
    }

    /* ===================== UI render ===================== */
    function renderPlayers(){
      playersGrid.innerHTML = '';

      const t = Number(sess && sess.tableType) || 4;
      const activeCount = activeSeatPlayers.length;
      const pausedSeatsArr = Array.from(pausedSeatSet);

      if(isVGame()){
        playerReqHint.textContent = 'Spieler 1 = Vorhand';
      } else if(allowsPartner()){
        playerReqHint.textContent = 'Wähle Spieler 1 · Partner optional';
      } else {
        playerReqHint.textContent = 'Wähle Spieler 1';
      }

      if(t === 4){
        pauseHint.textContent = 'Aktiv: 4';
      } else {
        pauseHint.textContent = 'Aktiv: ' + activeCount + ' · Pause: ' + pausedSeatsArr.join(',');
      }

      for(const sp of seatPlayers){
        const isPaused = pausedSeatSet.has(sp.seat) || pausedPlayerIdSet.has(sp.playerId);
        const tile = document.createElement('div');
        tile.className = 'pTile' + (isPaused ? ' paused' : '');
        tile.dataset.pid = String(sp.playerId);
        tile.dataset.paused = isPaused ? '1' : '0';

        const seatTag = isPaused ? (sp.seat + ' · PAUSE') : sp.seat;
        tile.innerHTML = `<div class="pName">${esc(sp.displayName)}</div><div class="pSeat">${esc(seatTag)}</div>`;

        tile.addEventListener('click', () => {
          if(tile.dataset.paused === '1') return;
          const pid = Number(tile.dataset.pid);

          if(isVGame()){
            if(pid === primaryId) return;
            if(!allowsPartner()) return;
            secondaryId = (secondaryId === pid) ? null : pid;
            ensureSelectionsValid();
            recomputeAndRender();
            return;
          }

          if(primaryId === pid){
            primaryId = null;
            secondaryId = null;
          } else if(secondaryId === pid){
            secondaryId = null;
          } else if(primaryId == null){
            primaryId = pid;
          } else if(allowsPartner() && secondaryId == null && pid !== primaryId){
            secondaryId = pid;
          } else {
            if(!allowsPartner()){
              primaryId = pid;
              secondaryId = null;
            } else {
              if(pid !== primaryId) secondaryId = pid;
            }
          }

          ensureSelectionsValid();
          recomputeAndRender();
        });

        playersGrid.appendChild(tile);
      }

      // selection classes
      [...playersGrid.querySelectorAll('.pTile')].forEach(el => {
        const pid = Number(el.dataset.pid);
        el.classList.remove('selectedPrimary','selectedSecondary','lockedPrimary');
        if(primaryId === pid){
          el.classList.add('selectedPrimary');
          if(isVGame()) el.classList.add('lockedPrimary');
        }
        if(secondaryId === pid) el.classList.add('selectedSecondary');
      });
    }

    function renderGame(){
      const label = GAME_LABELS[selectedGame.code] || selectedGame.code;
      gameNameEl.textContent = label;

      const activeN = activeSeatPlayers.length;
      if(selectedGame.code === 'SECHSERDREIER'){
        gameMetaEl.textContent = 'Sechserdreier: 4 ↔ −8 · Kontra via ZEILE';
      } else if(allowsPartner()){
        gameMetaEl.textContent = 'Team: 2vs2 oder 1vs' + (activeN - 1);
      } else {
        gameMetaEl.textContent = 'Team: 1 vs ' + (activeN - 1);
      }
    }

    function createPremiumRow(p){
      const row = document.createElement('div');
      row.className = 'premRow';
      row.id = 'row_' + p.key;
      row.dataset.pkey = p.key;

      const allowed = premiumAllowed(selectedGame.code, p.key);
      if(!allowed) row.classList.add('disabled');

      row.innerHTML = `
        <div class="premLeft"><div class="premName" data-part="name">${esc(p.displayLabel)}</div></div>
        <div class="premVal" data-part="val">
          <span class="pKBadge" id="kbadge_${p.key}" style="display:none;"></span>
          <span id="vtxt_${p.key}">0</span>
        </div>
      `;

      const nameEl = row.querySelector('[data-part="name"]');
      const valEl  = row.querySelector('[data-part="val"]');

      // Name: normal cycles value; in Kontra-Mode cycles premKontra (only if announced)
      nameEl.addEventListener('click', (ev) => {
        ev.preventDefault(); ev.stopPropagation();
        if(row.classList.contains('disabled')) return;

        if(kontraMode && isPremiumAnnounced(p.key)){
          premKontra[p.key] = cycleKontraLevel(premKontra[p.key]);
          recomputeAndRender();
          return;
        }

        cyclePremByName(p.key);
        recomputeAndRender();
      });

      // Value: sign toggle only
      valEl.addEventListener('click', (ev) => {
        ev.preventDefault(); ev.stopPropagation();
        if(row.classList.contains('disabled')) return;
        togglePremSignByNumber(p.key);
        recomputeAndRender();
      });

      // Row click: kontra cycle convenience (only if announced)
      row.addEventListener('click', () => {
        if(row.classList.contains('disabled')) return;
        if(!kontraMode) return;
        if(!isPremiumAnnounced(p.key)) return;
        premKontra[p.key] = cycleKontraLevel(premKontra[p.key]);
        recomputeAndRender();
      });

      return row;
    }

    function renderPremiums2Cols(){
      premLeftCol.innerHTML = '';
      premRightCol.innerHTML = '';

      const activePrems = getActivePremiums();

      // Keep the 2-column layout, but only render allowed premiums
      const left = activePrems.filter(p => p.column === 'LEFT');
      const right = activePrems.filter(p => p.column === 'RIGHT');

      for(const p of left) premLeftCol.appendChild(createPremiumRow(p));
      for(const p of right) premRightCol.appendChild(createPremiumRow(p));
    }

    /* ===================== Calculation ===================== */
    function calcGameComponent(teamIds){
      const delta = {};
      for(const sp of seatPlayers) delta[String(sp.playerId)] = 0;

      const activeIds = activePlayerIds();
      const n = activeIds.length;
      if(n < 2) return delta;

      const primary = (teamIds && teamIds.length) ? teamIds[0] : null;
      const partner = (teamIds && teamIds.length === 2) ? teamIds[1] : null;
      if(primary == null || pausedPlayerIdSet.has(primary)) return delta;

      const v = gameValueForDisplay();

      if(selectedGame.code === 'SECHSERDREIER'){
        const opp = activeIds.filter(id => id !== primary);
        delta[String(primary)] += v * opp.length;
        for(const id of opp) delta[String(id)] -= v;
        return delta;
      }

      const teamSize = (allowsPartner() && partner != null && !pausedPlayerIdSet.has(partner) && partner !== primary) ? 2 : 1;

      if(teamSize === 2){
        const opp = activeIds.filter(id => id !== primary && id !== partner);
        delta[String(primary)] += v;
        delta[String(partner)] += v;
        for(const id of opp) delta[String(id)] -= v;
      } else {
        const opp = activeIds.filter(id => id !== primary);
        delta[String(primary)] += v * opp.length;
        for(const id of opp) delta[String(id)] -= v;
      }

      return delta;
    }

    function calcPremiumsComponent(teamIds){
      const delta = {};
      for(const sp of seatPlayers) delta[String(sp.playerId)] = 0;
      if(!premiumsEnabled) return delta;

      const activeIds = activePlayerIds();
      if(activeIds.length < 2) return delta;

      const primary = (teamIds && teamIds.length) ? teamIds[0] : null;
      const partner = (teamIds && teamIds.length === 2) ? teamIds[1] : null;
      if(primary == null || pausedPlayerIdSet.has(primary)) return delta;

      const teamSize = (allowsPartner() && partner != null && !pausedPlayerIdSet.has(partner) && partner !== primary) ? 2 : 1;
      const teamSet = new Set(teamSize === 2 ? [primary, partner] : [primary]);
      const opp = activeIds.filter(id => !teamSet.has(id));

      const activePrems = getActivePremiums();
      for(const prem of activePrems){
        if(!premiumAllowed(selectedGame.code, prem.key)) continue;
        const ev = premEffectiveValue(prem.key);
        if(ev === 0) continue;

        if(teamSize === 2){
          delta[String(primary)] += ev;
          delta[String(partner)] += ev;
          for(const id of opp) delta[String(id)] -= ev;
        } else {
          delta[String(primary)] += ev * opp.length;
          for(const id of opp) delta[String(id)] -= ev;
        }
      }
      return delta;
    }

    function buildPremiumPartsPerPlayer(){
      const parts = [];
      if(!premiumsEnabled) return parts;

      const activeIds = activePlayerIds();
      const team = buildTeamIds();
      const primary = team[0] ?? null;
      const partner = (team.length === 2) ? team[1] : null;
      if(primary == null) return parts;

      const teamSize = (allowsPartner() && partner != null && partner !== primary) ? 2 : 1;
      const teamSet = new Set(teamSize === 2 ? [primary, partner] : [primary]);
      const opp = activeIds.filter(id => !teamSet.has(id));

      const activePrems = getActivePremiums();
      for(const prem of activePrems){
        if(!premiumAllowed(selectedGame.code, prem.key)) continue;
        const ev = premEffectiveValue(prem.key);
        if(ev === 0) continue;

        const part = (teamSize === 2) ? ev : (ev * opp.length);
        if(part !== 0) parts.push(part);
      }

      return parts;
    }

    /* ===================== Render loop ===================== */
    function recomputeAndRender(){
      refreshActivePlayers();
      computeEffectiveGameBase();
      ensureSelectionsValid();

      renderPlayers();
      renderGame();

      // Kontra UI
      if(kontraMode) root.classList.add('kontraMode'); else root.classList.remove('kontraMode');
      updateKontraUi();

      // Game value + badge
      const gv = gameValueForDisplay();
      gameValueText.textContent = String(gv);
      gameValueEl.classList.remove('numRed','numBlack');
      gameValueEl.classList.add(gv < 0 ? 'numRed' : 'numBlack');

      if(gameKontraLevel > 0){
        gameKBadge.textContent = kontraLabel(gameKontraLevel);
        gameKBadge.style.display = 'inline-block';
      } else {
        gameKBadge.style.display = 'none';
      }

      // Save enable
      let canSave = (primaryId != null && !pausedPlayerIdSet.has(primaryId));
      if(secondaryId != null){
        if(pausedPlayerIdSet.has(secondaryId)) canSave = false;
        if(primaryId === secondaryId) canSave = false;
        if(!allowsPartner()) canSave = false;
      }
      btnSave.disabled = !canSave;

      // Deltas
      const team = buildTeamIds();
      const dGame = calcGameComponent(team);
      const dPrem = calcPremiumsComponent(team);
      const dAll = mergeDelta(dGame, dPrem);

      // Premium display (only active premiums are rendered!)
      if(premiumsEnabled){
        const activePrems = getActivePremiums();
        for(const prem of activePrems){
          const txt = document.getElementById('vtxt_' + prem.key);
          const kb = document.getElementById('kbadge_' + prem.key);
          if(!txt || !kb) continue;

          if(!premiumAllowed(selectedGame.code, prem.key)){
            txt.textContent = '0';
            kb.style.display = 'none';
            continue;
          }

          const val = premValueSignedDisplay(prem.key);
          txt.textContent = String(val);

          const parent = txt.parentElement;
          parent.classList.remove('numRed','numBlack');
          parent.classList.add(val < 0 ? 'numRed' : 'numBlack');

          const lvl = Number(premKontra[prem.key]) || 0;
          if(lvl > 0){
            kb.textContent = kontraLabel(lvl);
            kb.style.display = 'inline-block';
          } else {
            kb.style.display = 'none';
          }
        }
      }

      updateKontraTargetability();
      renderKontraList();

      // Summary
      if(primaryId == null){
        sumLeft.textContent = 'Wähle Spieler 1';
        sumRight.textContent = '';
        return;
      }

      const name1 = playerNameById(primaryId);
      const isTwo = allowsPartner() && secondaryId != null;
      const names = isTwo ? (name1 + ' + ' + playerNameById(secondaryId)) : name1;

      const perPlayerTotal = Number(dAll[String(primaryId)]) || 0;
      const gamePartPerPlayer = Number(dGame[String(primaryId)]) || 0;
      const premParts = buildPremiumPartsPerPlayer().filter(x => Number(x) !== 0);

      let right = fmtPlus(perPlayerTotal);
      if(premParts.length > 0){
        const parts = [gamePartPerPlayer, ...premParts].map(fmtPlus).join(' ');
        right = fmtPlus(perPlayerTotal) + ' (' + parts + ')';
      }

      sumLeft.textContent = names;
      sumRight.textContent = right;
    }

    /* ===================== Save ===================== */
    async function onSave(){
      if(btnSave.disabled) return;

      const team = buildTeamIds();
      const dGame = calcGameComponent(team);
      const dPrem = calcPremiumsComponent(team);
      const dAll = mergeDelta(dGame, dPrem);

      const now = new Date().toISOString();
      const nextGabeNr = gabeNr;

      const activePrems = premiumsEnabled ? getActivePremiums() : [];
      const premPayload = premiumsEnabled
        ? activePrems.map(p => ({
            key: p.key,
            base: p.base,
            allowed: premiumAllowed(selectedGame.code, p.key),
            mag: Number(premMag[p.key]) || 0,
            sign: (premSign[p.key] === -1) ? -1 : +1,
            kontraLevel: Number(premKontra[p.key]) || 0
          }))
        : [];

      const gabe = {
        gabeNr: nextGabeNr,
        createdUtc: now,
        tableType: Number(sess.tableType),
        game: {
          code: selectedGame.code,
          category: String(selectedGame.category || ''),
          catalogValue: Number(selectedGame.value) || 0,
          baseValue: (selectedGame.code === 'SECHSERDREIER') ? null : (Number(gameEffectiveBase) || 0),
          displayRaw: gameRawValueForDisplay(),
          displayValue: gameValueForDisplay(),
          sign: (selectedGame.code === 'SECHSERDREIER') ? null : gameSign,
          sechserMode: (selectedGame.code === 'SECHSERDREIER') ? sechserMode : null,
          kontraLevel: gameKontraLevel
        },
        players: {
          primaryId: primaryId,
          secondaryId: (allowsPartner() ? (secondaryId || null) : null),
          primaryLockedToVorhand: isVGame()
        },
        premiums: premPayload,
        deltaByPlayerId: dAll
      };

      const totals = (currState && currState.totalByPlayerId) ? {...currState.totalByPlayerId} : {};
      const lastD = (currState && currState.lastDeltaByPlayerId) ? {...currState.lastDeltaByPlayerId} : {};

      for(const sp of seatPlayers){
        const pid = String(sp.playerId);
        const dv = Number(dAll[pid]) || 0;
        totals[pid] = (Number(totals[pid]) || 0) + dv;
        lastD[pid] = dv;
      }

      const newState = {
        key: CURR_KEY,
        totalByPlayerId: totals,
        lastDeltaByPlayerId: lastD,
        lastGabeNr: nextGabeNr,
        updatedUtc: now
      };

      const db = await openDb();
      await new Promise((resolve,reject) => {
        const tx = db.transaction([STORE_GABEN, STORE_CURR_STATE], 'readwrite');
        tx.objectStore(STORE_GABEN).put(gabe);
        tx.objectStore(STORE_CURR_STATE).put(newState);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
      db.close();

      const t = Number(sess.tableType);
      const target = (t === 4) ? '4er-Screen.html' : (t === 5) ? '5er-Screen.html' : '6er-Screen.html';
      window.location.href = target;
    }

    /* ===================== Init ===================== */
    btnCancel.addEventListener('click', () => {
      if(history.length > 1) history.back();
      else window.location.href = 'index.html';
    });

    window.addEventListener('load', async () => {
      try{
        selectedGame = JSON.parse(sessionStorage.getItem('selectedGame') || 'null');
      } catch {
        selectedGame = null;
      }

      if(!selectedGame || !selectedGame.code){
        if(history.length > 1) history.back();
        else window.location.href = 'index.html';
        return;
      }

      gameSign = +1;
      sechserMode = 'WIN';
      gameKontraLevel = 0;
      kontraMode = false;

      premiumsEnabled = !isNegativeGame();

      for(const p of PREMIUMS){
        premMag[p.key] = 0;
        premSign[p.key] = +1;
        premKontra[p.key] = 0;
      }

      const db = await openDb();
      sess = await idbGet(db, STORE_CURR_SESSION, CURR_KEY);
      currState = await idbGet(db, STORE_CURR_STATE, CURR_KEY);

      if(!sess || !sess.tableType || !sess.seats){
        db.close();
        window.location.href = 'index.html';
        return;
      }

      const t = Number(sess.tableType) || 4;
      root.classList.remove('table4','table5','table6');
      root.classList.add(t === 4 ? 'table4' : (t === 5 ? 'table5' : 'table6'));

      gabeNr = (currState && Number.isFinite(currState.lastGabeNr)) ? (Number(currState.lastGabeNr) + 1) : 1;
      gabeInfoEl.textContent = 'Gabe ' + gabeNr;

      const gameLabel = GAME_LABELS[selectedGame.code] || selectedGame.code;
      sub.textContent = 'Spiel: ' + gameLabel + ' (' + String(selectedGame.category || '') + ')';

      seatPlayers = [];
      const seatKeys = seatOrderFromSession();
      for(const seat of seatKeys){
        const pid = sess.seats[seat];
        if(pid == null) continue;

        const pl = await idbGetPlayer(db, pid).catch(() => null);
        let disp = String(pid);
        if(pl){
          const nach = String(pl.nachname || '').trim();
          const vor = String(pl.vorname || '').trim();
          disp = (nach + ' ' + vor).trim() || String(pid);
        }
        seatPlayers.push({ seat, playerId: Number(pid), displayName: disp });
      }
      db.close();

      refreshActivePlayers();
      computeEffectiveGameBase();
      if(isVGame()) enforceVorhandIfVGame();

      // Split-Rufer initial premium (only if premiums enabled; and not a color game)
      if(premiumsEnabled && !isColorGame()){
        applyInitialSplitPremiumIfNeeded();
      }

      ensureSelectionsValid();

      // Negativspiele: keine Prämien
      if(!premiumsEnabled){
        premBlock.style.display = 'none';
      }

      // Render premiums based on game type
      if(premiumsEnabled){
        renderPremiums2Cols();
      }

      updateKontraUi();
      updateKontraTargetability();
      renderKontraList();

      recomputeAndRender();

      // Kontra toggle
      btnKontra.addEventListener('click', () => setKontraMode(!kontraMode));

      // Spiel-Kontra: ZEILE klicken (nicht Wert) im Kontra-Modus
      gameTarget.addEventListener('click', (ev) => {
        if(!kontraMode) return;
        if(gameValueEl.contains(ev.target)) return;
        gameKontraLevel = cycleKontraLevel(gameKontraLevel);
        recomputeAndRender();
      });

      // Spielwert: toggelt Gewinn/Verlust
      gameValueEl.addEventListener('click', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        if(selectedGame.code === 'SECHSERDREIER'){
          sechserMode = (sechserMode === 'WIN') ? 'LOSS' : 'WIN';
        } else {
          gameSign = (gameSign === 1) ? -1 : 1;
        }
        recomputeAndRender();
      });

      btnSave.addEventListener('click', onSave);
    });
  </script>
</body>
</html>
