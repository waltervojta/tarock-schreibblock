<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ETS – Spieler auswählen</title>

<style>
:root{
  --bg:#cfe9ff;
  --panel:#cfe9ff;
  --barBg:#3b6fa8;
  --line:#000;
  --lineW:3px;
  --font:Arial,sans-serif;
  --black:#000;
  --btnBorder:rgba(0,0,0,.70);
  --btnRadius:10px;
  --iconDark:rgba(0,0,0,.92);
  --padX:12px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  background:var(--bg);
  font-family:var(--font);
  display:flex;
  justify-content:center;
  color:var(--black);
}

.phone{
  width:min(480px,100%);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== TOPBAR ===== */
.topbar{
  height:calc(58px + env(safe-area-inset-top));
  padding:calc(8px + env(safe-area-inset-top)) var(--padX) 8px;
  background:var(--barBg);
  border-bottom:var(--lineW) solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.titleWrap{display:flex;flex-direction:column}
.title{font-size:16px;font-weight:800;color:#fff}
.subtitle{font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}

.pill{
  height:30px;
  padding:0 10px;
  border-radius:10px;
  background:rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  font-weight:800;
  color:#fff;
}

/* ===== CONTENT ===== */
.content{
  flex:1;
  padding:12px var(--padX);
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow:hidden;
}

/* ===== SEATS (OBERER TEIL – FIX WIEDER SICHTBAR) ===== */
.seatPane{
  flex:0 0 46%;
  min-height:160px;
  border:1px solid var(--btnBorder);
  border-radius:var(--btnRadius);
  background:rgba(255,255,255,.60);
  padding:10px;
}

.miniLayout{
  height:100%;
  min-height:140px;
  display:grid;
  gap:8px;
}

.layout4{grid-template-columns:repeat(4,1fr)}
.layout5{grid-template-columns:repeat(4,1fr)}
.layout6{grid-template-columns:repeat(4,1fr)}

.seat{
  border:1px solid rgba(0,0,0,.35);
  border-radius:10px;
  background:#e6f3ff;
  padding:10px;
  font-weight:900;
}

/* ===== UNTERER TEIL – EXTRA KOMPAKT ===== */
.searchPane{
  flex:0 0 42%;
  border:1px solid var(--btnBorder);
  border-radius:var(--btnRadius);
  background:rgba(255,255,255,.60);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.searchHeader{
  padding:8px;
  border-bottom:1px solid rgba(0,0,0,.2);
}

.searchBox{
  width:100%;
  padding:8px;
  font-size:14px;
  font-weight:800;
}

.rows{
  flex:1;
  overflow:hidden;
}

/* ===== BOTTOM ===== */
.bottombar{
  flex:0 0 auto;
  background:var(--barBg);
  border-top:var(--lineW) solid var(--line);
  padding:8px var(--padX) calc(8px + env(safe-area-inset-bottom));
  display:flex;
  gap:10px;
}

.actionBtn{
  flex:1;
  height:46px;
  border-radius:12px;
  background:rgba(255,255,255,.25);
  color:#fff;
  font-weight:900;
  border:none;
}
.actionBtn.primary{background:rgba(255,255,255,.35)}
</style>
</head>

<body>
<div class="phone">

  <div class="topbar">
    <div class="titleWrap">
      <div class="title">Spieler auswählen</div>
      <div id="sub" class="subtitle">Tisch: …</div>
    </div>
    <div class="pill"><span id="seatCount">0/0</span></div>
  </div>

  <div class="content">
    <div class="seatPane">
      <div id="layout" class="miniLayout"></div>
    </div>

    <div class="searchPane">
      <div class="searchHeader">
        <input id="q" class="searchBox" type="text" placeholder="Suche: ID, Nachname oder Vorname">
      </div>
      <div id="rows" class="rows"></div>
    </div>
  </div>

  <div class="bottombar">
    <button id="btnBack" class="actionBtn">Zurück</button>
    <button id="btnStart" class="actionBtn primary" disabled>Start</button>
  </div>

</div>
</body>
</html>
